      const vgs = dest.returnVignettes || [];
      if (vgs.length) {
        steps.unshift({ type: 'vignette', vignette: vgs[returns % vgs.length] });
      }
    }
    steps.push({ type: 'showtime', isReturn: !first });
    return steps;
  }

  // ---- run -----------------------------------------------------------------

  // ctx: { state, scheduler, rng, session, dayKey, save, seen }
  function createRun(ctx, destId, miniFactIds) {
    const dest = Destinations.byId[destId];
    if (!dest && !miniFactIds) throw new TypeError('Unknown destination: ' + destId);
    // mailbag runs are destination-less: never create a visits entry for them
    const visit = miniFactIds
      ? { done: true, returns: 0 }
      : (ctx.state.visits[destId] = ctx.state.visits[destId] || { done: false, returns: 0 });
    const kind = miniFactIds ? 'mailbag' : (visit.done ? 'return' : 'first');

    const steps = miniFactIds
      ? miniFactIds.map((factId) => ({ type: 'retrieval', factId }))
      : composeSteps(ctx, dest, kind, visit.returns);

    const runIds = new Set();
    const presentedFacts = []; // facts she met this run (journal-close + tell-Dad)
    let pos = 0;
    let curServed = null;
    let attempts = 0;
    let resolvedFlag = false;
    let lastOutcome = null;
    let requeued = new Set(); // item ids already requeued once
    let summary = null;

    function pickSkillItem(domain) {
      const tier = Adaptive.tierFor(ctx.state.abilities[domain]);
      let item = null;
      for (let i = 0; i < 40; i++) {
        const cand = AdvContent.generate(destId, domain, tier, ctx.rng);
        if (!cand) break;
        item = item || cand;
        if (runIds.has(cand.id)) continue;
        item = cand;
        if (!ctx.seen.has(cand.id)) break;
      }
      if (!item) {
        // tiny pools can exhaust a domain entirely: fall back to math
        item = AdvContent.generate(destId, 'math', tier, ctx.rng);
      }
      runIds.add(item.id);
      ctx.seen.add(item.id);
      return item;
    }

    // serve-time side effects, idempotent per step
    function activateStep(step) {
      if (step.activated) return;
      step.activated = true;
      if (step.type === 'fact') {
        // box-0: presentation activates the fact; cap-deferred facts skip
        step.skipped = !ctx.scheduler.introduce(step.fact.id, ctx.session);
        if (!step.skipped) presentedFacts.push(step.fact);
      } else if (step.type === 'phrase' && step.phrase) {
        const p = (ctx.state.phrases[step.phrase.id] = ctx.state.phrases[step.phrase.id] || { heard: 0, built: 0 });
        p.heard += 1;
        ctx.save();
      } else if (step.type === 'friend' && step.animal) {
        if (ctx.state.friends.indexOf(step.animal.id) === -1) {
          ctx.state.friends.push(step.animal.id);
          ctx.save();
        }
      } else if (step.type === 'souvenir' && step.souvenir) {
        if (ctx.state.souvenirs.indexOf(step.souvenir.id) === -1) {
          ctx.state.souvenirs.push(step.souvenir.id);
          ctx.save();
        }
      }
    }

    function ensureCurrent() {
      while (pos < steps.length) {
        const step = steps[pos];
        activateStep(step);
        if (step.type === 'fact' && step.skipped) { pos += 1; continue; }
        if ((step.type === 'skill' || step.type === 'retrieval') && !curServed) {
          if (step.type === 'skill') {
            if (!step.item) step.item = pickSkillItem(step.domain);
            curServed = serve(step.item, ctx.rng);
          } else {
            const partner = Destinations.partnerOf(step.factId);
            const ps = partner ? ctx.scheduler.strengthOf(partner.id) : -1;
            const format = ctx.scheduler.formatFor(step.factId, ps);
            step.frame = step.frame || ctx.scheduler.nextFrame(step.factId, ctx.rng);
            const visitedNames = Object.keys(ctx.state.visits)
              .filter((id) => ctx.state.visits[id].done && Destinations.byId[id])
              .map((id) => Destinations.byId[id].name);
            const item = AdvContent.retrievalItem(step.factId, format, ctx.rng, visitedNames);
            if (!item) { pos += 1; continue; } // unknown fact id: never trap her
            curServed = serve(item, ctx.rng);
            curServed.frame = step.frame;
          }
          attempts = 0;
          resolvedFlag = false;
          lastOutcome = null;
        }
        return;
      }
    }

    function current() {
      if (summary) return null;
      ensureCurrent();
      if (pos >= steps.length) return null;
      const step = steps[pos];
      return {
        type: step.type,
        index: pos + 1,
        total: steps.length,
        step,
        item: curServed,
        destId,
        kind,
      };
    }

    function isCorrect(answer) {
      const it = curServed;
      if (it.type === 'tiles') {
        return typeof answer === 'string' && answer.trim().toUpperCase() === String(it.word).toUpperCase();
      }
      if (Array.isArray(it.answerIndices)) {
        if (!Array.isArray(answer) || answer.length !== it.answerIndices.length) return false;
        const want = it.answerIndices.slice().sort((a, b) => a - b);
        const got = answer.map(Number).sort((a, b) => a - b);
        return want.every((v, i) => v === got[i]);
      }
      return Number(answer) === it.answerIndex;
    }

    function revealAnswer() {
      const it = curServed;
      if (it.type === 'tiles') return it.word;
      if (Array.isArray(it.answerIndices)) return it.answerIndices.slice();
      return it.answerIndex;
    }

    function submit(answer) {
      if (summary) return null;
      ensureCurrent();
      const step = steps[pos];
      if (!step || (step.type !== 'skill' && step.type !== 'retrieval')) return null;
      if (resolvedFlag) return lastOutcome;
      attempts += 1;
      const correct = isCorrect(answer);
      const events = [];
      let outcome;

      if (correct) {
        const firstTry = attempts === 1;
        resolvedFlag = true;
        if (step.type === 'skill') {
          const d = curServed.domain;
          if (step.requeued) {
            ctx.state.abilities[d] = Adaptive.update(ctx.state.abilities[d], 'repaired');
          } else {
            ctx.state.abilities[d] = Adaptive.update(ctx.state.abilities[d], firstTry ? 'first' : 'hinted');
          }
        } else {
          const s = ctx.scheduler.recordSuccess(step.factId, ctx.session, ctx.dayKey);
          events.push({ type: 'inked', factId: step.factId, strength: s });
          if (curServed.thread && s >= 2) events.push({ type: 'thread', pairId: curServed.thread });
        }
        outcome = { status: 'correct', firstTry, resolved: true, events };
      } else if (attempts === 1) {
        outcome = { status: 'retry', firstTry: false, hint: curServed.hint || '', resolved: false, events };
      } else {
        resolvedFlag = true;
        if (step.type === 'skill') {
          const d = curServed.domain;
          ctx.state.abilities[d] = Adaptive.update(ctx.state.abilities[d], 'miss');
          // requeue one same-domain sibling 3-5 steps later, once per item
          if (!step.requeued && !requeued.has(curServed.id)) {
            requeued.add(curServed.id);
            const sibling = pickSkillItem(step.domain);
            const offset = 3 + Math.floor(ctx.rng() * 3);
            const at = Math.min(steps.length - 1, pos + offset); // before showtime
            steps.splice(at, 0, { type: 'skill', domain: step.domain, requeued: true, item: sibling });
          }
        } else {
          ctx.scheduler.recordMiss(step.factId, ctx.session);
        }
        outcome = {
          status: 'reveal',
          firstTry: false,
          hint: curServed.hint || '',
          explain: curServed.explain || '',
          correctAnswer: revealAnswer(),
          resolved: true,
          events,
        };
      }
      if (outcome.resolved) ctx.save();
      lastOutcome = outcome;
      return outcome;
    }

    function recordPhoto(moves, extra) {
      const photo = Object.assign(
        { dest: destId, moves: (moves || []).slice(0, 4), day: ctx.dayKey },
        extra || {}
      );
      ctx.state.photos.push(photo);
      ctx.save();
    }

    function finish() {
      if (kind === 'first') {
        visit.done = true;
      } else if (kind === 'return') {
        visit.returns += 1;
      }
      ctx.save();
      summary = { finished: true, destId, kind };
      return summary;
    }

    function advance() {
      if (summary) return summary;
      const step = steps[pos];
      if (step && (step.type === 'skill' || step.type === 'retrieval') && curServed && !resolvedFlag) {
        return current(); // not resolved yet — defensive
      }
      curServed = null;
      pos += 1;
      if (pos >= steps.length) return finish();
      return current();
    }

    function hint() {
      ensureCurrent();
      return (curServed && curServed.hint) || '';
    }

    return {
      destId, kind, current, submit, advance, hint, recordPhoto, steps,
      presentedFacts: () => presentedFacts.slice(),
    };
  }

  return { createRun, serve, shuffleTiles };
})();

// === src/engine/engine.js ===
// src/engine/engine.js — the adventure facade: the only thing the UI talks to.

const Engine = (() => {
  // The world tour, organized as continent chapters. Destinations unlock
  // sequentially through the flattened route; finishing the last stop of a
  // chapter opens the next continent.
  const CHAPTERS = [
    { name: 'The Journey Begins', dests: ['tci', 'nyc'] },
    { name: 'The Americas', dests: ['mex', 'rio'] },
    { name: 'Europe', dests: ['par', 'rey'] },
    { name: 'Africa', dests: ['mar', 'acc'] },
    { name: 'Asia', dests: ['che', 'tok'] },
    { name: 'Oceania', dests: ['syd', 'rot'] },
  ];
  const ROUTE = CHAPTERS.reduce((a, c) => a.concat(c.dests), []);

  function chapterOf(destId) {
    for (const c of CHAPTERS) if (c.dests.indexOf(destId) > -1) return c;
    return null;
  }

  function freshState() {
    return {
      abilities: Object.assign({}, Adaptive.START),
      sessions: 0,
      lastDay: '',
      facts: {},
      visits: {},
      phrases: {},
      souvenirs: [],
      friends: [],
      photos: [],
      settings: { muted: false, look: 'crystal' },
      crumbs: { met: false, bombed: [] },
      threadsSeen: [],
    };
  }

  // Defensive hydrate: loaded already passed Persist validation, but clamp
  // and shape everything anyway (mirror of the kingdom's guard).
  function hydrate(loaded) {
    const s = freshState();
    if (!loaded) return s;
    for (const d of Object.keys(s.abilities)) {
      const a = loaded.abilities && loaded.abilities[d];
      if (typeof a === 'number' && Number.isFinite(a)) s.abilities[d] = Adaptive.clamp(a);
    }
    if (Number.isInteger(loaded.sessions) && loaded.sessions >= 0) s.sessions = loaded.sessions;
    if (typeof loaded.lastDay === 'string') s.lastDay = loaded.lastDay;
    if (loaded.facts && typeof loaded.facts === 'object') {
      for (const id of Object.keys(loaded.facts)) {
        const f = loaded.facts[id];
        if (f && typeof f === 'object' && typeof f.s === 'number') {
          s.facts[id] = {
            s: Math.max(0, Math.min(3, f.s | 0)),
            due: Number.isInteger(f.due) ? f.due : 0,
            last: Number.isInteger(f.last) ? f.last : -1,
            lastDay: typeof f.lastDay === 'string' ? f.lastDay : '',
            introduced: Number.isInteger(f.introduced) ? f.introduced : -1,
            frame: typeof f.frame === 'string' ? f.frame : '',
          };
        }
      }
    }
    if (loaded.visits && typeof loaded.visits === 'object') {
      for (const id of Object.keys(loaded.visits)) {
        const v = loaded.visits[id];
        if (v && typeof v === 'object') {
          s.visits[id] = { done: !!v.done, returns: Number.isInteger(v.returns) ? Math.max(0, v.returns) : 0 };
        }
      }
    }
    if (loaded.phrases && typeof loaded.phrases === 'object') {
      for (const id of Object.keys(loaded.phrases)) {
        const p = loaded.phrases[id];
        if (p && typeof p === 'object') {
          s.phrases[id] = { heard: (p.heard | 0) || 0, built: (p.built | 0) || 0 };
        }
      }
    }
    if (Array.isArray(loaded.souvenirs)) s.souvenirs = loaded.souvenirs.filter((x) => typeof x === 'string');
    if (Array.isArray(loaded.friends)) s.friends = loaded.friends.filter((x) => typeof x === 'string');
    if (Array.isArray(loaded.photos)) s.photos = loaded.photos.filter((x) => x && typeof x === 'object');
    if (loaded.settings && typeof loaded.settings === 'object') {
      if (typeof loaded.settings.muted === 'boolean') s.settings.muted = loaded.settings.muted;
      if (typeof loaded.settings.look === 'string' && loaded.settings.look) s.settings.look = loaded.settings.look;
    }
    if (loaded.crumbs && typeof loaded.crumbs === 'object') {
      s.crumbs.met = !!loaded.crumbs.met;
      if (Array.isArray(loaded.crumbs.bombed)) s.crumbs.bombed = loaded.crumbs.bombed.filter((x) => typeof x === 'string');
    }
    if (Array.isArray(loaded.threadsSeen)) s.threadsSeen = loaded.threadsSeen.filter((x) => typeof x === 'string');
    return s;
  }

  function todayKey(now) {
    const d = now || new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  function create(opts) {
    const options = opts || {};
    const store = options.store;
    const rng = options.rng || Math.random;

    let loaded = null;
    try {
      loaded = store && typeof store.load === 'function' ? store.load() : null;
    } catch (e) {
      loaded = null;
    }
    const state = hydrate(loaded);
    const dayKey = options.dayKey || todayKey(options.now);

    // each boot is a session (the scheduler's clock); the same-day clamp
    // keeps rapid relaunches from fast-tracking anything to gold
    state.sessions += 1;
    state.lastDay = dayKey;

    const scheduler = Scheduler.create(state.facts);

    const game = {
      state,
      scheduler,
      dayKey,
      save() {
        try {
          if (store && typeof store.save === 'function') store.save(state);
        } catch (e) { /* a hostile store must never break gameplay */ }
      },
      setMuted(m) {
        state.settings.muted = !!m;
        game.save();
      },
      // she built a phrase from tiles (echo-trace or Hello Book)
      phraseBuilt(phraseId) {
        const p = (state.phrases[phraseId] = state.phrases[phraseId] || { heard: 0, built: 0 });
        p.built += 1;
        game.save();
        return p.built;
      },
      // caption the newest photo of a destination ("what should we tell Dad?")
      captionLastPhoto(destId, caption) {
        for (let i = state.photos.length - 1; i >= 0; i--) {
          if (state.photos[i].dest === destId) {
            state.photos[i].caption = String(caption || '').slice(0, 160);
            game.save();
            return true;
          }
        }
        return false;
      },
      // golden threads she has already watched draw in (no re-celebration)
      markThreadsSeen(pairIds) {
        let changed = false;
        for (const id of pairIds || []) {
          if (state.threadsSeen.indexOf(id) === -1) {
            state.threadsSeen.push(id);
            changed = true;
          }
        }
        if (changed) game.save();
      },
      destStatus(destId) {
        const v = state.visits[destId] || { done: false, returns: 0 };
        const i = ROUTE.indexOf(destId);
        const prevDone = i <= 0
          ? true
          : !!(state.visits[ROUTE[i - 1]] && state.visits[ROUTE[i - 1]].done);
        // Trade-winds pacing guard, third chapter onward: a new continent
        // departs once half the previous continent's stamps reach full color
        // (memory, not speed, fills the sails). Chapter 2 stays pure
        // sequential — finishing New York always opens the Americas.
        const ch = chapterOf(destId);
        const chIdx = CHAPTERS.indexOf(ch);
        let windsReady = true;
        if (ch && ch.dests[0] === destId && chIdx >= 2) {
          const prevCh = CHAPTERS[chIdx - 1];
          const shined = prevCh.dests.filter((d2) => {
            const v2 = state.visits[d2];
            return !!(v2 && v2.done) && scheduler.stampShine(Destinations.factIds(d2), true) >= 2;
          }).length;
          windsReady = shined >= Math.ceil(prevCh.dests.length / 2);
        }
        const factIds = Destinations.factIds(destId);
        return {
          unlocked: prevDone && windsReady,
          waitingOnWinds: prevDone && !windsReady,
          done: v.done,
          returns: v.returns,
          shine: scheduler.stampShine(factIds, v.done),
          chapter: ch,
        };
      },
      // the destination a finished visit just unlocked, if any (for toasts)
      nextAfter(destId) {
        const i = ROUTE.indexOf(destId);
        const next = i > -1 ? ROUTE[i + 1] : null;
        return next && Destinations.byId[next]
          ? { id: next, chapter: chapterOf(next), chapterStart: chapterOf(next) !== chapterOf(destId) }
          : null;
      },
      // golden threads light when both endpoints reach strength >= 2
      litThreads() {
        const lit = [];
        for (const pairId of Object.keys(Destinations.threads)) {
          const pair = Destinations.threads[pairId];
          if (pair.length === 2 && pair.every((id) => scheduler.strengthOf(id) >= 2)) lit.push(pairId);
        }
        return lit;
      },
      mailbagIds() {
        return scheduler.due(state.sessions, 3);
      },
      startVisit(destId) {
        return Visit.createRun(ctx, destId);
      },
      startMailbag() {
        const ids = game.mailbagIds();
        return ids.length ? Visit.createRun(ctx, 'mailbag', ids) : null;
      },
    };

    const ctx = {
      state,
      scheduler,
      rng,
      session: state.sessions,
      dayKey,
      seen: new Set(),
      save() { game.save(); },
    };

    game.save(); // persist the session tick immediately
    return game;
  }

  return { ROUTE, CHAPTERS, create, todayKey };
})();

// === src/speech/speech.js ===
// src/speech/speech.js — hardened speechSynthesis wrapper.
// Spec: ADVENTURE_BRIEF.md "What We Reuse vs Build New" (highest-risk item).
// Failure modes handled:
//  - hardware mute / no voice fires NO error event -> watchdog timer calls
//    onSilent so the UI can show the friendly sound card; TTS never blocks.
//  - iOS garbage-collects unreferenced utterances mid-speech -> refs retained.
//  - getVoices() is empty until 'voiceschanged' on Safari -> event-driven.
//  - Safari silently pauses long synthesis -> resume() heartbeat.
//  - rates below ~0.7 audibly distort iOS compact voices -> rate floored;
//    slow mode chunks word-by-word instead of slowing further.
//  - language voice quality varies -> per-language allowlist decides real
//    voice vs respelling-card fallback; exact lang tag, then prefix, then none.
// All entry points are safe no-ops outside a browser (Node tests import this).
const Speech = (() => {
  const RATE_NORMAL = 0.95;
  const RATE_SLOW = 0.7; // floor — slower is handled by chunking
  const WATCHDOG_MS = 2500; // generous: it only signals onSilent, never cancels
  const HEARTBEAT_MS = 4000;

  let synth = null;
  let voices = [];
  let primed = false;
  let muted = false;
  let heartbeat = 0;
  let gen = 0; // generation counter: a newer speak()/stop() invalidates older chains
  const liveUtterances = []; // GC guard — iOS drops unreferenced utterances

  // Languages allowed to use a real voice. Populated at runtime by probe()
  // plus this conservative default; everything else falls back to respelling
  // cards read by the default English voice.
  const allowlist = new Set(['en-US', 'en-GB', 'en-AU', 'es-MX', 'es-ES', 'fr-FR', 'zh-CN', 'ja-JP', 'pt-BR']);

  function hasSynth() {
    try {
      return typeof globalThis.window !== 'undefined'
        && !!globalThis.window.speechSynthesis
        && typeof globalThis.SpeechSynthesisUtterance !== 'undefined';
    } catch (e) {
      return false;
    }
  }

  function refreshVoices() {
    try { voices = synth.getVoices() || []; } catch (e) { voices = []; }
  }

  // Call on the first user gesture (Safari requires it). Idempotent.
  function init() {
    if (!hasSynth()) return false;
    if (!synth) {
      synth = globalThis.window.speechSynthesis;
      refreshVoices();
      try {
        synth.addEventListener('voiceschanged', refreshVoices);
      } catch (e) { /* older Safari: onvoiceschanged */
        try { synth.onvoiceschanged = refreshVoices; } catch (e2) { /* give up quietly */ }
      }
      // heartbeat: Safari silently pauses long utterances
      heartbeat = setInterval(() => {
        try { if (synth && synth.speaking && synth.paused) synth.resume(); } catch (e) { /* harmless */ }
      }, HEARTBEAT_MS);
    }
    if (!primed) {
      // speak a silent priming utterance inside the gesture
      try {
        const u = new globalThis.SpeechSynthesisUtterance(' ');
        u.volume = 0;
        synth.speak(u);
        primed = true;
      } catch (e) { /* stays unprimed; speak() will still try */ }
    }
    return true;
  }

  // exact lang tag -> prefix match -> null (lazy refresh closes the
  // voiceschanged race on the very first arrival)
  function voiceFor(lang) {
    if (!lang) return null;
    if (!voices.length && synth) refreshVoices();
    const exact = voices.find((v) => v.lang === lang);
    if (exact) return exact;
    const prefix = lang.split('-')[0];
    return voices.find((v) => v.lang && v.lang.split('-')[0] === prefix) || null;
  }

  // A language gets a real voice only when allowlisted AND installed.
  function canSpeak(lang) {
    if (!hasSynth() || !synth) return false;
    if (!allowlist.has(lang)) return false;
    return !!voiceFor(lang);
  }

  function setMuted(m) { muted = !!m; }

  function stop() {
    gen += 1; // invalidate any in-flight chunk chain and its watchdog
    try { if (synth) synth.cancel(); } catch (e) { /* harmless */ }
    liveUtterances.length = 0;
  }

  // speak(text, opts) -> true if attempted, false if unavailable.
  // opts: { lang, slow, onDone, onSilent }
  // slow mode chunks word-by-word at the floored rate (never below 0.7).
  // onSilent fires when nothing audibly started within the watchdog window
  // (hardware mute, missing voice) — the UI shows the respelling card and
  // moves on; speech NEVER gates progress.
  function speak(text, opts) {
    const o = opts || {};
    if (muted || !hasSynth() || !synth) {
      if (o.onSilent) o.onSilent();
      return false;
    }
    init();
    stop();
    const myGen = ++gen; // this chain owns the synth until superseded
    const chunks = o.slow ? String(text).split(/\s+/).filter(Boolean) : [String(text)];
    let started = false;
    let idx = 0;
    // watchdog signals the UI fallback but never cancels: a slow voice load
    // beyond the window can still speak, and a NEWER speak() must not be
    // killed by an OLDER watchdog (generation-checked)
    setTimeout(() => {
      if (gen === myGen && !started && o.onSilent) o.onSilent();
    }, WATCHDOG_MS);

    const next = () => {
      if (gen !== myGen) return; // superseded mid-chain: stop quietly
      if (idx >= chunks.length) {
        if (o.onDone) o.onDone();
        return;
      }
      let u;
      try {
        u = new globalThis.SpeechSynthesisUtterance(chunks[idx]);
      } catch (e) {
        if (o.onSilent) o.onSilent();
        return;
      }
      if (o.onChunk) {
        try { o.onChunk(idx, chunks[idx]); } catch (e) { /* UI hook only */ }
      }
      idx += 1;
      u.rate = o.slow ? RATE_SLOW : RATE_NORMAL;
      const v = o.lang ? voiceFor(o.lang) : null;
      if (v && o.lang && allowlist.has(o.lang)) {
        u.voice = v;
        u.lang = v.lang;
      }
      u.onstart = () => { started = true; };
      u.onend = () => {
        const at = liveUtterances.indexOf(u);
        if (at > -1) liveUtterances.splice(at, 1);
        next();
      };
      u.onerror = u.onend;
      liveUtterances.push(u); // keep a ref or iOS may GC it mid-speech
      try {
        synth.speak(u);
      } catch (e) {
        if (o.onSilent) o.onSilent();
      }
    };
    next();
    return true;
  }

  return { init, speak, stop, canSpeak, setMuted, allowlist, RATE_SLOW, RATE_NORMAL };
})();

// === src/audio/audiokit.js ===
// AudioKit — synthesized Web Audio sound kit for Charlie's Crystal Kingdom.
// All sounds are generated with oscillators, gain envelopes, and a touch of
// filtered noise. No assets, no network. Every public function is wrapped so
// it can never throw — before init, when muted, or when Web Audio is missing
// (e.g. importing this file in Node), every call is a silent no-op.

const AudioKit = (() => {
  // ---- private state (closure-scoped; nothing leaks to top level) ----------
  let akCtx = null;        // AudioContext, created lazily on first init() gesture
  let akMaster = null;     // master GainNode — mute gates this to hard zero
  let akMuted = false;
  let akNoiseBuf = null;   // cached white-noise buffer for the crystal crack

  const AK_MASTER_LEVEL = 0.85;

  // ---- core plumbing -------------------------------------------------------

  function akEnsureContext() {
    // Call-time feature detection only — never at module top level.
    if (typeof window === 'undefined') return null;
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return null;
    if (!akCtx) {
      akCtx = new AC();
      akMaster = akCtx.createGain();
      akMaster.gain.value = akMuted ? 0 : AK_MASTER_LEVEL;
      akMaster.connect(akCtx.destination);
    }
    // Safari resumes only inside a user gesture; init() is called on gestures,
    // so resuming here is safe and idempotent. WebKit can also park a context
    // in a non-standard 'interrupted' state after an app switch, screen lock,
    // or Siri — so resume on ANY non-running state, not just 'suspended'.
    if (akCtx.state !== 'running' && akCtx.resume) {
      const p = akCtx.resume();
      if (p && p.catch) p.catch(() => {});
    }
    return akCtx;
  }

  function akNow() {
    return akCtx ? akCtx.currentTime : 0;
  }

  // One short-lived oscillator voice. Created per sound, auto-disconnected on
  // end so nothing accumulates across a long session.
  function akTone(opts) {
    if (!akCtx || !akMaster) return;
    const t0 = opts.at;
    const dur = opts.dur;
    const peak = opts.peak !== undefined ? opts.peak : 0.2;
    const attack = opts.attack !== undefined ? opts.attack : 0.012;

    const osc = akCtx.createOscillator();
    const gain = akCtx.createGain();
    osc.type = opts.type || 'sine';
    osc.frequency.setValueAtTime(opts.freq, t0);
    if (opts.glideTo) {
      osc.frequency.exponentialRampToValueAtTime(opts.glideTo, t0 + dur);
    }

    // Click-free envelope: linear attack up, exponential release down.
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.linearRampToValueAtTime(peak, t0 + attack);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);

    osc.connect(gain);
    gain.connect(akMaster);
    osc.onended = () => {
      try {
        osc.disconnect();
        gain.disconnect();
      } catch (e) { /* already gone */ }
    };
    osc.start(t0);
    osc.stop(t0 + dur + 0.05);
  }

  // Short filtered-noise burst — the sparkle of a crystal crack.
  function akNoise(opts) {
    if (!akCtx || !akMaster) return;
    if (!akNoiseBuf) {
      const len = Math.floor(akCtx.sampleRate * 0.3);
      akNoiseBuf = akCtx.createBuffer(1, len, akCtx.sampleRate);
      const data = akNoiseBuf.getChannelData(0);
      for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
    }
    const t0 = opts.at;
    const dur = opts.dur;
    const src = akCtx.createBufferSource();
    src.buffer = akNoiseBuf;
    const filt = akCtx.createBiquadFilter();
    filt.type = opts.filterType || 'bandpass';
    filt.frequency.setValueAtTime(opts.freq, t0);
    filt.Q.value = opts.q !== undefined ? opts.q : 6;
    const gain = akCtx.createGain();
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.linearRampToValueAtTime(opts.peak !== undefined ? opts.peak : 0.25, t0 + 0.006);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    src.connect(filt);
    filt.connect(gain);
    gain.connect(akMaster);
    src.onended = () => {
      try {
        src.disconnect();
        filt.disconnect();
        gain.disconnect();
      } catch (e) { /* already gone */ }
    };
    src.start(t0);
    src.stop(t0 + dur + 0.05);
  }

  // ---- sound palette (C-major-ish, warm and musical) -----------------------
  // Note frequencies used: C3 130.81, E3 164.81, C4 261.63, D4 293.66,
  // E4 329.63, G4 392.0, C5 523.25, D5 587.33, E5 659.26, G5 783.99,
  // A5 880.0, C6 1046.5, E6 1318.5, G6 1568.0

  function akPlayTap() {
    // Soft pop: a tiny rounded blip with a gentle downward glide.
    const t = akNow();
    akTone({ freq: 523.25, glideTo: 392.0, type: 'triangle', at: t, dur: 0.07, peak: 0.12, attack: 0.004 });
  }

  function akPlayPop() {
    // Slightly fuller pop (reveal moment): soft sine drop.
    const t = akNow();
    akTone({ freq: 587.33, glideTo: 293.66, type: 'sine', at: t, dur: 0.13, peak: 0.16, attack: 0.005 });
  }

  function akPlayCorrect() {
    // Ascending major arpeggio, 4 notes, ~180ms each, staggered.
    // Base note varies subtly run-to-run so it never feels canned.
    const bases = [261.63, 293.66, 329.63]; // C4, D4, E4
    const base = bases[Math.floor(Math.random() * bases.length)];
    const ratios = [1, 1.25, 1.5, 2]; // root, major third, fifth, octave
    const t = akNow();
    for (let i = 0; i < ratios.length; i++) {
      akTone({
        freq: base * ratios[i],
        type: 'triangle',
        at: t + i * 0.09,
        dur: 0.18,
        peak: 0.16 + (i === ratios.length - 1 ? 0.04 : 0),
      });
    }
  }

  function akPlayMiss() {
    // Warm, kind low "hmm": E3 then C3, soft sines, never harsh.
    const t = akNow();
    akTone({ freq: 164.81, type: 'sine', at: t, dur: 0.26, peak: 0.14, attack: 0.03 });
    akTone({ freq: 130.81, type: 'sine', at: t + 0.2, dur: 0.34, peak: 0.13, attack: 0.03 });
  }

  function akPlayFanfare() {
    // Land-complete fanfare, ~1.2s: rising arpeggio into a held major chord.
    const t = akNow();
    const run = [261.63, 329.63, 392.0, 523.25]; // C4 E4 G4 C5
    for (let i = 0; i < run.length; i++) {
      akTone({ freq: run[i], type: 'triangle', at: t + i * 0.11, dur: 0.22, peak: 0.16 });
    }
    // Closing chord: C5 + E5 + G5, with a sine octave shimmer on top.
    const chordAt = t + 0.48;
    akTone({ freq: 523.25, type: 'triangle', at: chordAt, dur: 0.72, peak: 0.14, attack: 0.02 });
    akTone({ freq: 659.26, type: 'triangle', at: chordAt, dur: 0.72, peak: 0.12, attack: 0.02 });
    akTone({ freq: 783.99, type: 'triangle', at: chordAt, dur: 0.72, peak: 0.12, attack: 0.02 });
    akTone({ freq: 1046.5, type: 'sine', at: chordAt + 0.05, dur: 0.65, peak: 0.07, attack: 0.04 });
  }

  function akPlayHatch() {
    // Tiny chime: two bright high notes, quick and delicate.
    const t = akNow();
    akTone({ freq: 1318.5, type: 'sine', at: t, dur: 0.16, peak: 0.12, attack: 0.005 });
    akTone({ freq: 1568.0, type: 'sine', at: t + 0.09, dur: 0.24, peak: 0.12, attack: 0.005 });
  }

  function akPlayLevelup() {
    // Bright rising sparkle: quick pentatonic run with a shimmer on top.
    const t = akNow();
    const run = [523.25, 587.33, 659.26, 783.99, 880.0, 1046.5]; // C5 D5 E5 G5 A5 C6
    for (let i = 0; i < run.length; i++) {
      akTone({ freq: run[i], type: 'sine', at: t + i * 0.055, dur: 0.14, peak: 0.11, attack: 0.004 });
    }
    akTone({ freq: 2093.0, type: 'sine', at: t + 0.33, dur: 0.3, peak: 0.06, attack: 0.02 });
  }

  function akPlayBossHit() {
    // Crystalline crack: bright filtered-noise snap plus a glassy ping,
    // both with a very quick decay.
    const t = akNow();
    akNoise({ at: t, dur: 0.12, freq: 4200, q: 5, peak: 0.22 });
    akNoise({ at: t, dur: 0.06, freq: 7800, q: 2, peak: 0.1, filterType: 'highpass' });
    akTone({ freq: 1568.0, glideTo: 1244.5, type: 'sine', at: t + 0.005, dur: 0.14, peak: 0.13, attack: 0.003 });
  }

  const akSounds = {
    tap: akPlayTap,
    correct: akPlayCorrect,
    miss: akPlayMiss,
    fanfare: akPlayFanfare,
    hatch: akPlayHatch,
    levelup: akPlayLevelup,
    pop: akPlayPop,
    bossHit: akPlayBossHit,
  };

  // ---- destination motifs: short note sequences by name ---------------------
  const AK_NOTE_FREQ = {
    C3: 130.81, D3: 146.83, E3: 164.81, F3: 174.61, G3: 196.0, A3: 220.0, B3: 246.94,
    C4: 261.63, D4: 293.66, E4: 329.63, F4: 349.23, G4: 392.0, A4: 440.0, B4: 493.88,
    C5: 523.25, D5: 587.33, E5: 659.26, F5: 698.46, G5: 783.99, A5: 880.0, B5: 987.77,
    C6: 1046.5,
  };

  function akPlayTune(notes, bpm) {
    if (!Array.isArray(notes) || !notes.length) return;
    const beat = 60 / Math.max(40, Math.min(200, bpm || 100));
    const t = akNow();
    for (let i = 0; i < notes.length; i++) {
      const f = AK_NOTE_FREQ[notes[i]];
      if (!f) continue;
      akTone({ freq: f, type: 'triangle', at: t + i * beat * 0.5, dur: beat * 0.45, peak: 0.1, attack: 0.015 });
    }
  }

  // ---- public API (every function is throw-proof) --------------------------

  return {
    init() {
      // Safe on every gesture: creates the context once, resumes if suspended,
      // and is a silent no-op anywhere Web Audio does not exist.
      try {
        akEnsureContext();
      } catch (e) { /* never throws */ }
    },

    poke() {
      // Resume an EXISTING context only (e.g. on visibilitychange after an
      // interruption). Never creates a context — creation stays gesture-driven.
      try {
        if (akCtx && akCtx.state !== 'running' && akCtx.resume) {
          const p = akCtx.resume();
          if (p && p.catch) p.catch(() => {});
        }
      } catch (e) { /* never throws */ }
    },

    play(name) {
      try {
        if (akMuted) return;               // muted = hard silence
        if (!akCtx || !akMaster) return;   // not initialized yet = silent no-op
        if (akCtx.state !== 'running') return;
        const fn = akSounds[name];
        if (fn) fn();
      } catch (e) { /* never throws */ }
    },

    tune(notes, bpm) {
      try {
        if (akMuted) return;
        if (!akCtx || !akMaster) return;
        if (akCtx.state !== 'running') return;
        akPlayTune(notes, bpm);
      } catch (e) { /* never throws */ }
    },

    setMuted(muted) {
      try {
        akMuted = !!muted;
        if (akMaster && akCtx) {
          // Hard-gate the master bus so even in-flight tails go silent fast.
          const t = akCtx.currentTime;
          akMaster.gain.cancelScheduledValues(t);
          akMaster.gain.setValueAtTime(akMaster.gain.value, t);
          akMaster.gain.linearRampToValueAtTime(akMuted ? 0 : AK_MASTER_LEVEL, t + 0.02);
        }
      } catch (e) { /* never throws */ }
    },

    isMuted() {
      try {
        return akMuted;
      } catch (e) {
        return false;
      }
    },
  };
})();

// === src/ui/juice.js ===
// Juice — small delight helpers: toast queue, springy press states, gentle
// shake. DOM access is feature-detected at call time so importing this file
// in Node never crashes; in a browser everything just works.

const Juice = (() => {
  // ---- private state -------------------------------------------------------
  let jzToastQueue = [];
  let jzToastShowing = false;
  let jzToastWrap = null;
  let jzPressified = false; // guard against double-wiring the same document

  const JZ_TOAST_HOLD_MS = 2300;  // how long a toast stays before dismissing
  const JZ_TOAST_EXIT_MS = 320;   // matches the exit transition in juice.css
  const JZ_SHAKE_MS = 460;        // matches the shake keyframes duration
  const JZ_DIM_MS = 360;          // matches the dim keyframes duration

  function jzHasDom() {
    return typeof window !== 'undefined' && typeof document !== 'undefined';
  }

  function jzReducedMotion() {
    try {
      if (!jzHasDom() || typeof window.matchMedia !== 'function') return false;
      return window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    } catch (e) {
      return false;
    }
  }

  // ---- toast queue ---------------------------------------------------------

  function jzEnsureToastWrap() {
    if (jzToastWrap && jzToastWrap.isConnected) return jzToastWrap;
    jzToastWrap = document.createElement('div');
    jzToastWrap.className = 'jz-toast-wrap';
    jzToastWrap.setAttribute('aria-live', 'polite');
    document.body.appendChild(jzToastWrap);
    return jzToastWrap;
  }

  function jzShowNextToast() {
    if (jzToastShowing) return;
    const next = jzToastQueue.shift();
    if (next === undefined) return;
    jzToastShowing = true;

    const wrap = jzEnsureToastWrap();
    const el = document.createElement('div');
    el.className = 'jz-toast';
    el.textContent = next.text;
    wrap.appendChild(el);

    // Force a layout so the entrance animation always plays from the start.
    void el.offsetWidth;
    el.classList.add('jz-toast-in');

    window.setTimeout(() => {
      el.classList.remove('jz-toast-in');
      el.classList.add('jz-toast-out');
      window.setTimeout(() => {
        if (el.parentNode) el.parentNode.removeChild(el);
        jzToastShowing = false;
        jzShowNextToast();
      }, JZ_TOAST_EXIT_MS);
    }, next.hold);
  }

  // ---- delegated press states ---------------------------------------------

  function jzWirePress(rootEl) {
    let pressedEl = null;

    const release = () => {
      if (pressedEl) {
        pressedEl.classList.remove('is-pressed');
        pressedEl = null;
      }
    };

    rootEl.addEventListener('pointerdown', (e) => {
      try {
        const target = e.target && e.target.closest ? e.target.closest('[data-press]') : null;
        release();
        if (target) {
          pressedEl = target;
          target.classList.add('is-pressed');
        }
      } catch (err) { /* never break input handling */ }
    }, { passive: true });

    rootEl.addEventListener('pointerup', release, { passive: true });
    rootEl.addEventListener('pointercancel', release, { passive: true });
    rootEl.addEventListener('pointerleave', release, { passive: true });
  }

  // ---- public API ----------------------------------------------------------

  return {
    // Top toast with spring entrance; queued so messages never overlap.
    // Optional holdMs overrides how long this toast stays on screen.
    toast(text, holdMs) {
      try {
        if (!jzHasDom() || !text) return;
        const hold = holdMs > 0 ? Number(holdMs) : JZ_TOAST_HOLD_MS;
        jzToastQueue.push({ text: String(text), hold });
        jzShowNextToast();
      } catch (e) { /* never throws */ }
    },

    // Delegated springy press states for everything marked [data-press].
    // One set of listeners on the root — no per-element wiring.
    pressify(rootEl) {
      try {
        if (!jzHasDom()) return;
        const root = rootEl || document.body;
        if (!root || !root.addEventListener) return;
        if (root === document.body && jzPressified) return;
        if (root === document.body) jzPressified = true;
        jzWirePress(root);
      } catch (e) { /* never throws */ }
    },

    // Gentle horizontal shake for a retry moment. With reduced motion
    // preferred, a brief dim takes its place — no movement at all.
    shake(el) {
      try {
        if (!jzHasDom() || !el || !el.classList) return;
        if (jzReducedMotion()) {
          el.classList.remove('jz-dim');
          void el.offsetWidth;
          el.classList.add('jz-dim');
          window.setTimeout(() => el.classList.remove('jz-dim'), JZ_DIM_MS);
        } else {
          el.classList.remove('jz-shake');
          void el.offsetWidth;
          el.classList.add('jz-shake');
          window.setTimeout(() => el.classList.remove('jz-shake'), JZ_SHAKE_MS);
        }
      } catch (e) { /* never throws */ }
    },

    reducedMotion() {
      return jzReducedMotion();
    },
  };
})();

// === src/ui/particles.js ===
// Particles — canvas overlay particle system for Charlie's Crystal Kingdom.
// Contract: attach(canvas), burst(kind, x, y, opts), sparkleTrail(x, y),
// setReduced(bool), tick(dt), count(). Hard cap 300 live particles.
// One rAF loop lives in main.js and calls Particles.tick(dt) with dt in seconds.

const Particles = (() => {
  const MAX = 300;
  const live = [];
  let cvs = null;
  let ctx = null;
  let reduced = false;
  let cssW = 0;
  let cssH = 0;

  const COLORS = {
    shatter: ['#7ef0e2', '#b9a7ff', '#f4f1ff', '#5eead4', '#c4b5fd'],
    confetti: ['#ffd166', '#ff8e7a', '#2dd4bf', '#a78bfa', '#f7f5ff', '#7ef0e2', '#f0abfc'],
    hatch: ['#ffd166', '#ffe9a8', '#f7f5ff', '#ffc94d'],
    sparkle: ['#ffd166', '#f7f5ff', '#c4b5fd', '#7ef0e2'],
  };

  function pick(arr) {
    return arr[(Math.random() * arr.length) | 0];
  }

  function resize() {
    if (!cvs) return;
    const dpr = Math.min((typeof window !== 'undefined' && window.devicePixelRatio) || 1, 2);
    cssW = window.innerWidth;
    cssH = window.innerHeight;
    cvs.width = Math.max(1, Math.round(cssW * dpr));
    cvs.height = Math.max(1, Math.round(cssH * dpr));
    cvs.style.width = cssW + 'px';
    cvs.style.height = cssH + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function attach(canvas) {
    cvs = canvas;
    ctx = canvas.getContext('2d');
    resize();
    window.addEventListener('resize', resize);
    window.addEventListener('orientationchange', resize);
  }

  // Cap enforcement: new spawns evict the oldest live particles.
  function push(p) {
    if (live.length >= MAX) live.splice(0, live.length - MAX + 1);
    live.push(p);
  }

  function spawnOne(kind, x, y) {
    const a = Math.random() * Math.PI * 2;
    if (kind === 'shatter') {
      const sp = 130 + Math.random() * 250;
      push({
        kind, x, y,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp - 130,
        g: 640,
        rot: Math.random() * Math.PI * 2,
        vr: (Math.random() - 0.5) * 12,
        size: 4 + Math.random() * 7,
        life: 0.7 + Math.random() * 0.5,
        age: 0,
        color: pick(COLORS.shatter),
        shape: 'shard',
      });
    } else if (kind === 'confetti') {
      const sp = 220 + Math.random() * 320;
      const up = -Math.PI / 2 + (Math.random() - 0.5) * 1.3;
      push({
        kind, x, y,
        vx: Math.cos(up) * sp,
        vy: Math.sin(up) * sp,
        g: 460,
        rot: Math.random() * Math.PI * 2,
        vr: (Math.random() - 0.5) * 16,
        size: 5 + Math.random() * 6,
        life: 1.4 + Math.random() * 1.1,
        age: 0,
        wob: Math.random() * Math.PI * 2,
        color: pick(COLORS.confetti),
        shape: 'rect',
      });
    } else if (kind === 'hatch') {
      const sp = 90 + Math.random() * 200;
      push({
        kind, x, y,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp - 170,
        g: 380,
        rot: 0,
        vr: 0,
        size: 3 + Math.random() * 5,
        life: 0.8 + Math.random() * 0.6,
        age: 0,
        color: pick(COLORS.hatch),
        shape: Math.random() < 0.5 ? 'star' : 'dot',
      });
    } else {
      // sparkle
      const sp = 30 + Math.random() * 90;
      push({
        kind: 'sparkle', x, y,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp - 30,
        g: 60,
        rot: Math.random() * Math.PI,
        vr: (Math.random() - 0.5) * 4,
        size: 2.5 + Math.random() * 4,
        life: 0.5 + Math.random() * 0.5,
        age: 0,
        color: pick(COLORS.sparkle),
        shape: 'star',
      });
    }
  }

  const DEFAULT_COUNT = { shatter: 26, confetti: 60, hatch: 30, sparkle: 12 };

  function burst(kind, x, y, opts) {
    if (reduced || !ctx) return;
    const n = (opts && opts.count) || DEFAULT_COUNT[kind] || 12;
    for (let i = 0; i < n; i++) spawnOne(kind, x, y);
  }

  function sparkleTrail(x, y) {
    if (reduced || !ctx) return;
    for (let i = 0; i < 2; i++) spawnOne('sparkle', x + (Math.random() - 0.5) * 12, y + (Math.random() - 0.5) * 12);
  }

  function setReduced(b) {
    reduced = !!b;
    if (reduced) {
      live.length = 0;
      if (ctx) ctx.clearRect(0, 0, cssW, cssH);
    }
  }

  function drawStar(p, alpha) {
    const s = p.size;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    // four-point twinkle
    ctx.moveTo(0, -s);
    ctx.quadraticCurveTo(s * 0.22, -s * 0.22, s, 0);
    ctx.quadraticCurveTo(s * 0.22, s * 0.22, 0, s);
    ctx.quadraticCurveTo(-s * 0.22, s * 0.22, -s, 0);
    ctx.quadraticCurveTo(-s * 0.22, -s * 0.22, 0, -s);
    ctx.fill();
    ctx.restore();
  }

  function tick(dt) {
    if (!ctx) return;
    ctx.clearRect(0, 0, cssW, cssH);
    if (!live.length || !dt) {
      // still clear so stale frames never linger after setReduced(true)
      if (!live.length) return;
    }
    for (let i = live.length - 1; i >= 0; i--) {
      const p = live[i];
      p.age += dt;
      if (p.age >= p.life || p.y > cssH + 80) {
        live.splice(i, 1);
        continue;
      }
      p.vy += p.g * dt;
      if (p.shape === 'rect') {
        p.wob += dt * 6;
        p.x += (p.vx + Math.sin(p.wob) * 60) * dt;
      } else {
        p.x += p.vx * dt;
      }
      p.y += p.vy * dt;
      p.rot += p.vr * dt;

      const t = p.age / p.life;
      const alpha = t < 0.7 ? 1 : 1 - (t - 0.7) / 0.3;
      if (p.shape === 'shard') {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.globalAlpha = alpha * 0.95;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.moveTo(0, -p.size);
        ctx.lineTo(p.size * 0.7, p.size * 0.6);
        ctx.lineTo(-p.size * 0.7, p.size * 0.6);
        ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = alpha * 0.35;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(0, 0, p.size * 0.45, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      } else if (p.shape === 'rect') {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size / 2, -p.size * 0.35, p.size, p.size * 0.7);
        ctx.restore();
      } else if (p.shape === 'star') {
        drawStar(p, alpha);
      } else {
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * 0.6, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }
    ctx.globalAlpha = 1;
  }

  function count() {
    return live.length;
  }

  return { attach, burst, sparkleTrail, setReduced, tick, count };
})();

// === src/ui/routemap.js ===
// RouteMap — the world tour map: destinations snake across the sky in
// continent order, each a floating island tinted by its own palette with its
// landmark glyph, real local time, and a stamp-shine ring. Golden threads
// draw between destinations once both endpoint facts are strong.
// API: RouteMap.render(container, view, onSelect)
//   view = { dests: [{id,name,unlocked,done,shine,utcOffset,palette,mapEmoji}],
//            threadPairs: [[destIdA, destIdB]], hour: 0-23, now: Date }
const RouteMap = (() => {
  // one CHAPTER per map page (scales to any number of chapters); up to four
  // destinations arc across the sky
  const PAGE_SPOTS = [
    { x: 180, y: 440 }, { x: 430, y: 300 }, { x: 680, y: 430 }, { x: 880, y: 280 },
  ];

  function skyFor(hour) {
    if (hour >= 21 || hour < 6) return ['#0d0b30', '#1d1b4b', '#34255e'];
    if (hour < 9) return ['#2a2160', '#6d4a9e', '#d98a82'];
    if (hour < 17) return ['#1c4a8e', '#3a6fb5', '#7ec8e8'];
    return ['#241c58', '#5a4088', '#b06f93'];
  }

  function localTimeText(utcOffset, now) {
    const d = now || new Date();
    let h = d.getUTCHours() + utcOffset;
    const m = d.getUTCMinutes();
    h = ((h % 24) + 24) % 24;
    const ampm = h >= 12 ? 'pm' : 'am';
    const h12 = h % 12 === 0 ? 12 : h % 12;
    return h12 + ':' + String(m).padStart(2, '0') + ' ' + ampm;
  }

  function islandBase(w, top, side) {
    const hw = w / 2;
    return (
      '<ellipse cx="0" cy="0" rx="' + hw + '" ry="' + hw * 0.3 + '" fill="' + top + '"/>' +
      '<path d="M' + -hw * 0.92 + ' 5 L' + -hw * 0.5 + ' ' + hw * 0.7 + ' L0 ' + hw * 0.88 +
      ' L' + hw * 0.55 + ' ' + hw * 0.65 + ' L' + hw * 0.92 + ' 5 Q0 ' + hw * 0.4 + ' ' + -hw * 0.92 + ' 5 Z" fill="' + side + '"/>'
    );
  }

  function lockIcon() {
    return (
      '<g transform="translate(0 -30)">' +
      '<path d="M-7 -3 L-7 -9 Q-7 -17 0 -17 Q7 -17 7 -9 L7 -3" fill="none" stroke="#dcd6ff" stroke-width="4" stroke-linecap="round"/>' +
      '<path d="M-11 -3 L11 -3 L9 15 L0 19 L-9 15 Z" fill="#bfb6ea"/>' +
      '<circle cx="0" cy="5" r="3.2" fill="#4d4880"/>' +
      '</g>'
    );
  }

  function stampRing(shine) {
    if (!shine) return '';
    const color = shine === 3 ? '#ffd166' : shine === 2 ? '#7ef0e2' : 'rgba(247,245,255,0.6)';
    const dash = shine === 1 ? ' stroke-dasharray="7 6"' : '';
    let s = '<ellipse cx="0" cy="-14" rx="76" ry="56" fill="none" stroke="' + color + '" stroke-width="3.5"' + dash + ' opacity="0.85"/>';
    if (shine === 3) s += '<ellipse cx="0" cy="-14" rx="84" ry="63" fill="none" stroke="#ffd166" stroke-width="2" opacity="0.5"/>';
    return s;
  }

  function destGroup(dest, idx, now) {
    const spot = PAGE_SPOTS[idx];
    if (!spot) return '';
    const state = !dest.unlocked ? 'locked' : dest.done ? 'done' : 'open';
    const pal = dest.palette || { a: '#7ef0e2', b: '#a78bfa' };
    const locked = state === 'locked';
    return (
      '<g class="rm-dest" data-dest="' + dest.id + '" data-state="' + state +
      '" role="button" aria-label="' + dest.name + '" transform="translate(' + spot.x + ' ' + spot.y + ')"' +
      (locked ? ' opacity="0.55"' : '') + '>' +
      stampRing(dest.shine) +
      '<g class="rm-float">' +
      islandBase(118, locked ? '#8d89a8' : pal.a, '#4a4470') +
      '<text y="-26" text-anchor="middle" font-size="46"' + (locked ? ' opacity="0.5"' : '') + '>' + (dest.mapEmoji || '🌍') + '</text>' +
      (locked ? lockIcon() : '') +
      '<text class="rm-name" x="0" y="42" text-anchor="middle" font-size="19" fill="#f7f5ff" stroke="#12103a" stroke-width="4" paint-order="stroke">' + dest.name + '</text>' +
      (dest.unlocked
        ? '<text class="rm-time" data-utc="' + dest.utcOffset + '" x="0" y="63" text-anchor="middle" font-size="14" fill="#ffe9a8" stroke="#12103a" stroke-width="3" paint-order="stroke">🕐 ' + localTimeText(dest.utcOffset, now) + '</text>'
        : '') +
      '</g>' +
      '<rect x="-92" y="-92" width="184" height="172" fill="none" pointer-events="all"/>' +
      '</g>'
    );
  }

  // the chapter's flight path, with arrival/departure stubs toward
  // neighboring chapters when they exist
  function routePath(count, hasPrev, hasNext) {
    let d = '';
    const first = PAGE_SPOTS[0];
    if (hasPrev) d = 'M20 ' + (first.y + 60) + ' Q90 ' + (first.y + 20) + ' ' + first.x + ' ' + first.y;
    for (let i = 0; i < Math.min(count, PAGE_SPOTS.length); i++) {
      const p = PAGE_SPOTS[i];
      if (i === 0) {
        d += (d ? ' ' : '') + 'M' + p.x + ' ' + p.y;
      } else {
        const prev = PAGE_SPOTS[i - 1];
        const mx = (prev.x + p.x) / 2;
        const my = (prev.y + p.y) / 2 - 50;
        d += ' Q' + mx + ' ' + my + ' ' + p.x + ' ' + p.y;
      }
    }
    if (hasNext && count > 0) {
      const last = PAGE_SPOTS[Math.min(count, PAGE_SPOTS.length) - 1];
      d += ' Q' + (last.x + 70) + ' ' + (last.y - 50) + ' 985 ' + (last.y - 90);
    }
    return '<path d="' + d + '" fill="none" stroke="#f7f5ff" stroke-width="3.5" stroke-dasharray="2 12" stroke-linecap="round" opacity="0.5"/>';
  }

  function threadLines(pairs, stubs, idsOnPage) {
    let s = '';
    for (const pair of pairs || []) {
      const ia = idsOnPage.indexOf(pair.ids[0]);
      const ib = idsOnPage.indexOf(pair.ids[1]);
      if (ia < 0 || ib < 0) continue;
      const pa = PAGE_SPOTS[ia];
      const pb = PAGE_SPOTS[ib];
      const mx = (pa.x + pb.x) / 2;
      const my = Math.min(pa.y, pb.y) - 70;
      s += '<path class="rm-thread' + (pair.fresh ? ' rm-thread-new' : '') + '" d="M' + pa.x + ' ' + (pa.y - 24) +
        ' Q' + mx + ' ' + my + ' ' + pb.x + ' ' + (pb.y - 24) +
        '" fill="none" stroke="#ffd166" stroke-width="2.5" stroke-linecap="round" opacity="0.75"/>';
    }
    // a golden stub reaches off-page toward the far end of the thread
    for (const stub of stubs || []) {
      const i = idsOnPage.indexOf(stub.id);
      if (i < 0) continue;
      const p = PAGE_SPOTS[i];
      const toRight = stub.dir !== 'left';
      const ex = toRight ? 990 : 10;
      s += '<path class="rm-thread' + (stub.fresh ? ' rm-thread-new' : '') + '" d="M' + p.x + ' ' + (p.y - 24) +
        ' Q' + ((p.x + ex) / 2) + ' ' + (p.y - 110) + ' ' + ex + ' ' + (p.y - 140) +
        '" fill="none" stroke="#ffd166" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="6 8" opacity="0.6"/>';
    }
    return s;
  }

  function skyBits(hour) {
    let s = '';
    const night = hour >= 19 || hour < 7;
    if (night) {
      const seeds = [60, 150, 260, 410, 530, 640, 760, 880, 940, 340, 200, 700];
      for (const x of seeds) {
        const y = 14 + ((x * 7919) % 90);
        s += '<circle class="wm-skystar" cx="' + x + '" cy="' + y + '" r="' + (1.2 + ((x * 31) % 10) / 6).toFixed(1) +
          '" fill="#f7f5ff" style="animation-delay:' + (-(x % 24) / 10) + 's"/>';
      }
    }
    const cloud = (cls, y, sc) =>
      '<g class="wm-cloud ' + cls + '" opacity="0.4" transform="translate(0 ' + y + ') scale(' + sc + ')">' +
      '<ellipse cx="0" cy="0" rx="46" ry="16" fill="#f7f5ff" opacity="0.5"/>' +
      '<ellipse cx="-26" cy="6" rx="28" ry="11" fill="#f7f5ff" opacity="0.4"/>' +
      '<ellipse cx="30" cy="7" rx="26" ry="10" fill="#f7f5ff" opacity="0.4"/></g>';
    s += cloud('', 230, 0.9) + cloud('c2', 390, 0.7) + cloud('c3', 70, 0.55);
    return s;
  }

  function render(container, view, onSelect) {
    const hour = typeof view.hour === 'number' ? view.hour : 12;
    const sky = skyFor(hour);
    container.style.background =
      'linear-gradient(180deg, ' + sky[0] + ' 0%, ' + sky[1] + ' 52%, ' + sky[2] + ' 100%)';
    const now = view.now;
    const ids = view.dests.map((d) => d.id);
    let svg = '<svg viewBox="0 0 1000 620" preserveAspectRatio="xMidYMid meet" aria-label="World tour map">';
    svg += skyBits(hour);
    svg += routePath(view.dests.length, !!view.hasPrev, !!view.hasNext);
    svg += threadLines(view.threadPairs, view.threadStubs, ids);
    view.dests.forEach((d, i) => { svg += destGroup(d, i, now); });
    // the little plane rides beside the first not-done unlocked stop
    const nextIdx = view.dests.findIndex((d) => d.unlocked && !d.done);
    if (nextIdx > -1) {
      const p = PAGE_SPOTS[nextIdx];
      svg += '<g class="rm-plane" transform="translate(' + (p.x - 100) + ' ' + (p.y - 96) + ')"><text text-anchor="middle" font-size="30">✈️</text></g>';
    }
    svg += '</svg>';
    container.innerHTML = svg;

    container.onclick = (e) => {
      const g = e.target && e.target.closest ? e.target.closest('.rm-dest') : null;
      if (g && onSelect) onSelect(g.getAttribute('data-dest'));
    };
    const releaseAll = () => {
      for (const el of container.querySelectorAll('.rm-pressed')) el.classList.remove('rm-pressed');
    };
    container.onpointerdown = (e) => {
      const g = e.target && e.target.closest ? e.target.closest('.rm-dest') : null;
      if (g) g.classList.add('rm-pressed');
    };
    container.onpointerup = releaseAll;
    container.onpointercancel = releaseAll;
  }

  return { render, localTimeText };
})();

// === src/ui/avatar.js ===
// Avatar — SVG gymnast with ponytail and gradient leotard.
// Avatar.mount(el) injects the rig; Avatar.trick(streakN) plays a CSS-keyframe
// trick that varies with streak length; Avatar.idle() returns to the idle bob.
// Reduced motion: CSS swaps every trick for a gentle bounce (styles.css).
// Note: SVG paint-server references are not allowed by the build rules, so the
// leotard "gradient" is layered solid fills (violet -> sea -> teal).

const Avatar = (() => {
  let rigEl = null;
  let hostEl = null;
  let trickTimer = 0;

  const TRICKS = ['av-cartwheel', 'av-flip', 'av-stuck'];
  const TRICK_MS = { 'av-cartwheel': 1050, 'av-flip': 1100, 'av-stuck': 1400 };

  const SVG = [
    '<svg viewBox="0 0 120 170" role="img" aria-label="Charlie the gymnast">',
    '<g class="av-rig av-idle">',
    // ponytail (behind the head, swings)
    '<g class="av-pony">',
    '<path d="M76 26 Q98 30 96 56 Q94 74 84 80 Q90 60 80 46 Q74 36 72 32 Z" fill="#6b4226"/>',
    '<circle cx="77" cy="29" r="5" fill="#ffd166"/>',
    '</g>',
    // head + hair
    '<circle cx="60" cy="34" r="17" fill="#f2c39b"/>',
    '<path d="M43 32 Q44 14 60 14 Q76 14 77 32 Q70 22 60 22 Q50 22 43 32 Z" fill="#7a4a2b"/>',
    // face
    '<circle cx="54" cy="34" r="2.4" fill="#33254f"/>',
    '<circle cx="66" cy="34" r="2.4" fill="#33254f"/>',
    '<path d="M53 42 Q60 48 67 42" fill="none" stroke="#b3604a" stroke-width="2.6" stroke-linecap="round"/>',
    '<circle cx="49" cy="40" r="3" fill="#ff8e7a" opacity="0.55"/>',
    '<circle cx="71" cy="40" r="3" fill="#ff8e7a" opacity="0.55"/>',
    // arms raised in a V (gymnast salute)
    '<path d="M46 62 Q32 50 26 34" fill="none" stroke="#f2c39b" stroke-width="8" stroke-linecap="round"/>',
    '<path d="M74 62 Q88 50 94 34" fill="none" stroke="#f2c39b" stroke-width="8" stroke-linecap="round"/>',
    // leotard torso — layered fills fake a violet-to-teal gradient
    '<path d="M46 56 Q60 50 74 56 L78 92 Q60 102 42 92 Z" fill="#8b5cf6"/>',
    '<path d="M44.5 74 Q60 70 75.5 74 L78 92 Q60 102 42 92 Z" fill="#56a8d6" opacity="0.85"/>',
    '<path d="M43.4 84 Q60 80 76.7 84 L78 92 Q60 102 42 92 Z" fill="#2dd4bf" opacity="0.95"/>',
    // legs
    '<path d="M50 96 L46 140" fill="none" stroke="#f2c39b" stroke-width="9" stroke-linecap="round"/>',
    '<path d="M70 96 L74 140" fill="none" stroke="#f2c39b" stroke-width="9" stroke-linecap="round"/>',
    // slippers
    '<ellipse cx="45" cy="145" rx="8" ry="4.5" fill="#a78bfa"/>',
    '<ellipse cx="75" cy="145" rx="8" ry="4.5" fill="#a78bfa"/>',
    // leotard sparkles
    '<circle cx="55" cy="66" r="2" fill="#ffe9a8"/>',
    '<circle cx="66" cy="78" r="1.7" fill="#ffe9a8"/>',
    '<circle cx="60" cy="88" r="1.4" fill="#f7f5ff"/>',
    '</g>',
    '</svg>',
  ].join('');

  function mount(el) {
    if (!el) return;
    hostEl = el;
    el.classList.add('avatar');
    el.innerHTML = SVG;
    rigEl = el.querySelector('.av-rig');
    idle();
  }

  function clearTricks() {
    if (!rigEl) return;
    for (const t of TRICKS) rigEl.classList.remove(t);
  }

  function idle() {
    if (!rigEl) return;
    if (trickTimer) {
      clearTimeout(trickTimer);
      trickTimer = 0;
    }
    clearTricks();
    rigEl.classList.add('av-idle');
  }

  // streakN: current first-try streak. 1 → cartwheel, 2 → flip, 3+ → stuck landing.
  function trick(streakN) {
    if (!rigEl) return;
    const n = Math.max(1, streakN | 0);
    const name = n >= 3 ? 'av-stuck' : TRICKS[(n - 1) % 2];
    if (trickTimer) clearTimeout(trickTimer);
    clearTricks();
    rigEl.classList.remove('av-idle');
    // force a reflow so re-triggering the same trick restarts the animation
    void rigEl.getBoundingClientRect();
    rigEl.classList.add(name);
    trickTimer = setTimeout(idle, TRICK_MS[name] || 1200);
  }

  // helper for main.js: screen-space center of the avatar (sparkle trail origin)
  function center() {
    if (!hostEl) return null;
    const r = hostEl.getBoundingClientRect();
    if (!r.width) return null;
    return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
  }

  return { mount, trick, idle, center };
})();

  // ---------- journal close: the landing every session deserves ----------

  function journalClose(el, view) {
