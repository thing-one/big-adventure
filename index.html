<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Big Adventure">
<meta name="format-detection" content="telephone=no">
<title>&#x1F30D; Charlie's Big Adventure</title>
<style>
/* === src/ui/styles.css === */
/* ============================================================
   Charlie's Crystal Kingdom — visual system
   Palette: twilight indigo base, aurora violet, crystal teal,
   warm coral, star gold, cloud white. No external assets.
   ============================================================ */

:root {
  --indigo-deep: #12103a;
  --indigo: #1d1b4b;
  --indigo-soft: #2c2766;
  --violet: #8b5cf6;
  --aurora: #a78bfa;
  --aurora-soft: #c4b5fd;
  --teal: #2dd4bf;
  --teal-soft: #7ef0e2;
  --coral: #ff8e7a;
  --coral-soft: #ffb3a3;
  --gold: #ffd166;
  --gold-soft: #ffe9a8;
  --white: #f7f5ff;
  --ink: #241f52;

  /* land theme defaults (map screen) */
  --land-a: var(--aurora);
  --land-b: var(--teal);
  --land-glow: rgba(167, 139, 250, 0.45);

  --glass: rgba(255, 255, 255, 0.12);
  --glass-edge: rgba(255, 255, 255, 0.28);
  --shadow-deep: 0 18px 40px rgba(8, 6, 30, 0.45);
  --shadow-soft: 0 8px 22px rgba(8, 6, 30, 0.3);
  --radius: 24px;
  --tap: 64px;
}

/* per-land hue theming */
[data-land='woods']    { --land-a: #4ade80; --land-b: #2dd4bf; --land-glow: rgba(74, 222, 128, 0.4); }
[data-land='reef']     { --land-a: #2dd4bf; --land-b: #38bdf8; --land-glow: rgba(45, 212, 191, 0.4); }
[data-land='mountains']{ --land-a: #93c5fd; --land-b: #c4b5fd; --land-glow: rgba(147, 197, 253, 0.4); }
[data-land='palace']   { --land-a: #a78bfa; --land-b: #f0abfc; --land-glow: rgba(167, 139, 250, 0.45); }
[data-land='summit']   { --land-a: #ffd166; --land-b: #ff8e7a; --land-glow: rgba(255, 209, 102, 0.45); }
[data-land='castle']   { --land-a: #7ef0e2; --land-b: #c4b5fd; --land-glow: rgba(126, 240, 226, 0.5); }

/* world 2 — Starlight Kingdom */
[data-land='grove']      { --land-a: #6ee7b7; --land-b: #a3e635; --land-glow: rgba(110, 231, 183, 0.4); }
[data-land='lagoon']     { --land-a: #38bdf8; --land-b: #818cf8; --land-glow: rgba(56, 189, 248, 0.4); }
[data-land='cliffs']     { --land-a: #c4b5fd; --land-b: #f0abfc; --land-glow: rgba(196, 181, 253, 0.4); }
[data-land='maze']       { --land-a: #e879f9; --land-b: #7ef0e2; --land-glow: rgba(232, 121, 249, 0.45); }
[data-land='lighthouse'] { --land-a: #fbbf24; --land-b: #38bdf8; --land-glow: rgba(251, 191, 36, 0.45); }
[data-land='starcastle'] { --land-a: #ffd166; --land-b: #f0abfc; --land-glow: rgba(255, 209, 102, 0.5); }

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
  background: var(--indigo-deep);
}

body {
  font-family: ui-rounded, -apple-system, system-ui, 'Segoe UI', sans-serif;
  color: var(--white);
  -webkit-text-size-adjust: 100%;
}

.game-surface, .game-surface * {
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}

#app {
  position: fixed;
  inset: 0;
  overflow: hidden;
  background:
    radial-gradient(120% 90% at 50% 110%, var(--indigo-soft) 0%, var(--indigo) 45%, var(--indigo-deep) 100%);
  padding:
    env(safe-area-inset-top)
    env(safe-area-inset-right)
    env(safe-area-inset-bottom)
    env(safe-area-inset-left);
}

#fx {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 60;
}

/* ---------- screens ---------- */
.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  animation: cck-screen-in 0.45s ease both;
}
@keyframes cck-screen-in {
  from { opacity: 0; transform: scale(1.02); }
  to   { opacity: 1; transform: scale(1); }
}

/* ---------- buttons ---------- */
button {
  font: inherit;
  color: inherit;
  border: none;
  background: none;
  cursor: pointer;
}

.btn {
  min-width: var(--tap);
  min-height: var(--tap);
  padding: 12px 26px;
  border-radius: 22px;
  font-size: 24px;
  font-weight: 700;
  letter-spacing: 0.01em;
  /* solid tint instead of backdrop blur: buttons sit over animated skies and
     the per-frame blur tax outweighs the look (cards/overlays keep theirs) */
  background: rgba(29, 27, 75, 0.55);
  border: 1.5px solid var(--glass-edge);
  box-shadow: var(--shadow-soft);
  color: var(--white);
  transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.2s ease;
}
.btn:active, .tile:active, .choice:active, [data-press]:active {
  transform: scale(0.93);
  box-shadow: 0 3px 10px rgba(8, 6, 30, 0.35);
}
.btn-primary {
  background: linear-gradient(135deg, var(--violet), var(--teal));
  border-color: rgba(255, 255, 255, 0.45);
  text-shadow: 0 1px 3px rgba(8, 6, 30, 0.35);
}
.btn-ghost { font-size: 22px; padding: 10px 18px; }
.btn-big { font-size: 28px; padding: 16px 32px; }

/* ---------- glass cards ---------- */
.card {
  background: var(--glass);
  border: 1.5px solid var(--glass-edge);
  border-radius: var(--radius);
  -webkit-backdrop-filter: blur(18px);
  backdrop-filter: blur(18px);
  box-shadow: var(--shadow-deep);
}

/* ============================================================
   TITLE SCREEN
   ============================================================ */
.screen-title {
  align-items: center;
  justify-content: center;
  gap: 26px;
  text-align: center;
  padding: 24px;
}
.title-gem {
  font-size: 84px;
  line-height: 1;
  filter: drop-shadow(0 0 24px rgba(126, 240, 226, 0.65));
  animation: cck-bob 2.6s ease-in-out infinite;
}
.game-title {
  font-size: clamp(40px, 7vw, 76px);
  font-weight: 800;
  line-height: 1.05;
}
.game-title .grad {
  display: block;
  background: linear-gradient(100deg, var(--gold), var(--teal-soft), var(--aurora-soft), var(--gold));
  background-size: 250% 100%;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
  animation: cck-shimmer-text 5s linear infinite;
}
@keyframes cck-shimmer-text {
  from { background-position: 0% 0; }
  to   { background-position: 250% 0; }
}
.title-spark { display: inline-block; animation: cck-twinkle 1.8s ease-in-out infinite; color: var(--gold); }
.title-spark:nth-child(2n) { animation-delay: 0.6s; }
.title-sub { font-size: 24px; color: var(--aurora-soft); }
.btn-play {
  font-size: 40px;
  padding: 22px 70px;
  border-radius: 36px;
  background: linear-gradient(135deg, var(--coral), var(--gold));
  border: 2px solid rgba(255, 255, 255, 0.5);
  color: #4a2418;
  box-shadow: 0 14px 34px rgba(255, 142, 122, 0.4), var(--shadow-soft);
  animation: cck-breathe 2.2s ease-in-out infinite;
}
@keyframes cck-breathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

/* ============================================================
   MAP SCREEN
   ============================================================ */
.screen-map { overflow: hidden; }
.map-stage { position: absolute; inset: 0; }
.map-stage svg { width: 100%; height: 100%; display: block; }
.map-top {
  position: absolute;
  top: max(10px, env(safe-area-inset-top));
  left: 0; right: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 18px;
  z-index: 5;
  pointer-events: none;
}
.map-top .btn { pointer-events: auto; }
.map-title {
  font-size: clamp(22px, 3.4vw, 34px);
  font-weight: 800;
  text-shadow: 0 2px 12px rgba(8, 6, 30, 0.6);
}
.map-actions { display: flex; gap: 12px; }

/* companion cheerleader beside the avatar */
.cheer {
  font-size: 44px;
  line-height: 1;
  text-align: center;
  margin-top: 6px;
  filter: drop-shadow(0 4px 10px rgba(8, 6, 30, 0.4));
}
.cheer.cheer-bounce { animation: cck-cheer-bounce 0.9s ease; }
.cheer.cheer-peek { animation: cck-cheer-peek 0.8s ease; }
@keyframes cck-cheer-bounce {
  0%   { transform: translateY(0) scale(1); }
  30%  { transform: translateY(-26px) scale(1.15); }
  55%  { transform: translateY(0) scale(0.94, 0.88); }
  75%  { transform: translateY(-9px) scale(1.04); }
  100% { transform: translateY(0) scale(1); }
}
@keyframes cck-cheer-peek {
  0%   { transform: rotate(0); }
  30%  { transform: rotate(-14deg) translateY(2px); }
  70%  { transform: rotate(10deg); }
  100% { transform: rotate(0); }
}

/* wardrobe swatches in settings */
.wardrobe-title { margin-bottom: -4px; }
.wardrobe { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.swatch {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  min-width: var(--tap);
  min-height: var(--tap);
  padding: 8px 6px;
  border: 2px solid transparent;
  border-radius: 16px;
  background: var(--glass);
  color: var(--white);
  font-family: inherit;
  font-size: 13px;
  font-weight: 700;
}
.swatch-chip {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: 2px solid var(--glass-edge);
}
.swatch.current { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(255, 209, 102, 0.3); }
.swatch.locked { opacity: 0.55; }

/* grown-up peek */
.parent-peek {
  border-top: 1px solid var(--glass-edge);
  padding-top: 8px;
  text-align: left;
}

/* balloon dock on the map */
.wm-balloon { cursor: pointer; }
.wm-balloon .wm-float { animation: cck-island-float 5.2s ease-in-out infinite; }

/* islands acknowledge the touch: `scale` composes with the SVG transform
   attribute (a CSS `transform` here would override the island's position) */
.wm-land, .wm-balloon {
  transform-box: fill-box;
  transform-origin: center;
  transition: scale 0.14s ease;
}
.wm-land.wm-pressed, .wm-balloon.wm-pressed { scale: 0.95; }

/* homecoming: the land this run just unlocked says hello */
.wm-land.wm-justfreed .wm-float { animation: cck-justfreed 1.1s ease, cck-island-float 5.4s ease-in-out 1.1s infinite; }
@keyframes cck-justfreed {
  0%   { transform: translateY(0) scale(1); }
  35%  { transform: translateY(-22px) scale(1.08); }
  65%  { transform: translateY(-4px) scale(0.98); }
  100% { transform: translateY(0) scale(1); }
}

/* flying letter tile (presentation clone; state lands instantly) */
.tile-fly {
  position: fixed;
  z-index: 90;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 18px;
  font-size: 34px;
  font-weight: 800;
  font-family: inherit;
  color: var(--ink);
  background: linear-gradient(160deg, var(--white), #ddd6ff);
  border: 1.5px solid rgba(255, 255, 255, 0.7);
  box-shadow: var(--shadow-soft);
  pointer-events: none;
  transition: transform 0.2s cubic-bezier(0.34, 1.3, 0.64, 1);
  will-change: transform;
}

/* friends screen: petting, speech bubbles, collection count */
.friends-count {
  margin-left: auto;
  padding: 8px 16px;
  border-radius: 999px;
  background: var(--glass);
  border: 1.5px solid var(--glass-edge);
  font-size: 18px;
  font-weight: 700;
  color: var(--gold-soft);
  white-space: nowrap;
}
.friend { position: relative; }
.friend[data-hatched] { cursor: pointer; }
.friend-bubble {
  position: absolute;
  top: 6px;
  left: 50%;
  transform: translate(-50%, 0);
  width: max-content;
  max-width: 200px;
  padding: 10px 14px;
  border-radius: 16px;
  background: var(--white);
  color: var(--ink);
  font-size: 16px;
  font-weight: 700;
  line-height: 1.25;
  box-shadow: var(--shadow-soft);
  z-index: 4;
  pointer-events: none;
}
.friend-bubble::after {
  content: '';
  position: absolute;
  bottom: -7px;
  left: 50%;
  transform: translateX(-50%);
  border: 8px solid transparent;
  border-top-color: var(--white);
  border-bottom: 0;
}
.friend-emoji.friend-pop { animation: cck-cheer-bounce 0.9s ease; }

/* celebration stage bump per star */
.screen-celebrate.cele-bump { animation: cck-cele-bump 0.22s ease; }
@keyframes cck-cele-bump {
  0%, 100% { transform: scale(1); }
  45% { transform: scale(1.015); }
}

/* settings: scrollable card + the wardrobe try-on stage */
.settings-card {
  max-height: min(86vh, 86dvh);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}
.settings-avatar {
  display: flex;
  justify-content: center;
  height: 116px;
  flex: 0 0 auto;
}
.settings-avatar svg { height: 100%; width: auto; }

/* balloon travel overlay: clouds sweep across, balloon arcs over the top */
.travel-overlay {
  position: fixed;
  inset: 0;
  z-index: 80;
  pointer-events: all;
}
.travel-overlay::before {
  content: '';
  position: absolute;
  inset: 0;
  z-index: 1;
  background: #f7f5ff;
  opacity: 0;
  animation: tv-veil 2.1s ease-in-out forwards;
}
.travel-overlay svg {
  position: relative;
  z-index: 2;
  width: 100%;
  height: 100%;
  display: block;
}
.tv-cloud { opacity: 0.96; }
.tv-cloud.c1 { animation: tv-sweep-a 2.1s ease-in-out forwards; }
.tv-cloud.c2 { animation: tv-sweep-b 2.1s ease-in-out forwards; }
.tv-cloud.c3 { animation: tv-sweep-a 2.1s ease-in-out forwards; animation-delay: 0.08s; }
.tv-cloud.c4 { animation: tv-sweep-b 2.1s ease-in-out forwards; animation-delay: 0.14s; }
.tv-balloon { animation: tv-balloon 2.1s ease-in-out forwards; }
@keyframes tv-veil {
  0%   { opacity: 0; }
  42%  { opacity: 1; }
  58%  { opacity: 1; }
  100% { opacity: 0; }
}
@keyframes tv-sweep-a {
  0%   { transform: translate(-700px, 420px) scale(1.1); }
  45%  { transform: translate(180px, 360px) scale(1.5); }
  55%  { transform: translate(320px, 350px) scale(1.5); }
  100% { transform: translate(1500px, 300px) scale(1.2); }
}
@keyframes tv-sweep-b {
  0%   { transform: translate(1700px, 170px) scale(1.2); }
  45%  { transform: translate(740px, 220px) scale(1.5); }
  55%  { transform: translate(600px, 230px) scale(1.5); }
  100% { transform: translate(-900px, 260px) scale(1.1); }
}
@keyframes tv-balloon {
  0%   { transform: translate(110px, 540px) scale(0.9); }
  50%  { transform: translate(490px, 130px) scale(1.5); }
  100% { transform: translate(890px, 560px) scale(0.9); }
}

/* travel button between the two kingdoms */
.btn-travel {
  font-size: 22px;
  padding: 10px 18px;
  border: 2px solid var(--gold);
  animation: cck-travel-pulse 2.2s ease-in-out infinite;
}
@keyframes cck-travel-pulse {
  0%, 100% { box-shadow: 0 0 0 2px rgba(255, 209, 102, 0.25), var(--shadow-soft); }
  50%      { box-shadow: 0 0 0 8px rgba(255, 209, 102, 0.45), var(--shadow-soft); }
}

/* --- world map SVG pieces --- */
.wm-cloud { animation: cck-drift 26s linear infinite; }
.wm-cloud.c2 { animation-duration: 38s; animation-delay: -14s; }
.wm-cloud.c3 { animation-duration: 50s; animation-delay: -30s; }
@keyframes cck-drift {
  from { transform: translateX(-220px); }
  to   { transform: translateX(1220px); }
}
.wm-skystar { animation: cck-twinkle 2.4s ease-in-out infinite; }
@keyframes cck-twinkle {
  0%, 100% { opacity: 0.35; }
  50% { opacity: 1; }
}
.wm-aurora {
  animation: cck-aurora 9s ease-in-out infinite alternate;
}
@keyframes cck-aurora {
  from { opacity: 0.25; transform: translateY(0); }
  to   { opacity: 0.6;  transform: translateY(-14px); }
}
.wm-path {
  stroke-dasharray: 10 16;
  animation: cck-path-flow 3.2s linear infinite;
}
@keyframes cck-path-flow {
  from { stroke-dashoffset: 0; }
  to   { stroke-dashoffset: -52; }
}

.wm-land { cursor: pointer; }
.wm-land .wm-float { animation: cck-island-float 5.4s ease-in-out infinite; }
.wm-land:nth-of-type(2n) .wm-float { animation-delay: -2.7s; }
@keyframes cck-island-float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-9px); }
}
.wm-land[data-state='locked'] { filter: saturate(0.18) brightness(0.72); }
.wm-land[data-state='locked'] .wm-float { animation: none; }
/* done-glow lives on the already-rendered ellipse only — a drop-shadow here
   re-blurred the whole floating island every frame (jank grew with progress) */
.wm-land[data-state='done'] .wm-doneglow { animation: cck-glow-pulse 2.6s ease-in-out infinite; }
@keyframes cck-glow-pulse {
  0%, 100% { opacity: 0.35; }
  50% { opacity: 0.85; }
}
.wm-land.wm-next .wm-ring { animation: cck-next-pulse 1.6s ease-in-out infinite; }
@keyframes cck-next-pulse {
  0%, 100% { opacity: 0.15; transform: scale(0.96); }
  50% { opacity: 0.8; transform: scale(1.06); }
}
.wm-name { font-weight: 800; }

.wm-tree { transform-origin: center bottom; transform-box: fill-box; animation: cck-sway 3.4s ease-in-out infinite; }
.wm-tree.t2 { animation-delay: -1.2s; }
.wm-tree.t3 { animation-delay: -2.3s; }
@keyframes cck-sway {
  0%, 100% { transform: rotate(-2.5deg); }
  50% { transform: rotate(2.5deg); }
}
.wm-wave { animation: cck-wave 3s ease-in-out infinite; }
.wm-wave.w2 { animation-delay: -1.5s; }
@keyframes cck-wave {
  0%, 100% { transform: translateX(-6px); }
  50% { transform: translateX(6px); }
}
.wm-snow { animation: cck-snowfall 4.6s linear infinite; }
.wm-snow.s2 { animation-delay: -1.6s; }
.wm-snow.s3 { animation-delay: -3.1s; }
@keyframes cck-snowfall {
  from { transform: translateY(-34px); opacity: 0; }
  20%  { opacity: 0.9; }
  90%  { opacity: 0.7; }
  to   { transform: translateY(30px); opacity: 0; }
}
.wm-facet { animation: cck-facet 2.8s ease-in-out infinite; }
.wm-facet.f2 { animation-delay: -0.9s; }
.wm-facet.f3 { animation-delay: -1.8s; }
@keyframes cck-facet {
  0%, 100% { opacity: 0.35; }
  50% { opacity: 1; }
}
.wm-halo { animation: cck-glow-pulse 3s ease-in-out infinite; }

/* ============================================================
   CHALLENGE SCREEN
   ============================================================ */
.screen-challenge { padding: 6px 14px 12px; }
.ch-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 6px 4px;
  min-height: 72px;
}
.ch-top-right { display: flex; align-items: center; gap: 12px; }
.ch-land-chip {
  font-size: 22px;
  font-weight: 800;
  padding: 8px 18px;
  border-radius: 18px;
  background: linear-gradient(120deg, var(--land-a), var(--land-b));
  color: var(--indigo-deep);
  box-shadow: var(--shadow-soft);
}
.dots { display: flex; gap: 9px; align-items: center; }
.dot {
  width: 16px; height: 16px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.22);
  position: relative;
}
.dot.done { background: var(--gold); box-shadow: 0 0 8px rgba(255, 209, 102, 0.7); }
.dot.now {
  background: var(--white);
  animation: cck-dot-now 1.2s ease-in-out infinite;
}
@keyframes cck-dot-now {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.35); }
}
.dot-egg::after {
  content: '🥚';
  position: absolute;
  font-size: 13px;
  top: -17px; left: 50%;
  transform: translateX(-50%);
}
.dot-egg.done::after { content: '✨'; }

.ch-body {
  flex: 1;
  display: flex;
  align-items: stretch;
  gap: 16px;
  min-height: 0;
}
.ch-avatar {
  flex: 0 0 190px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 10px;
}
.ch-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  /* flex-start + auto-margin spacers: centers when content fits, and the top
     stays reachable when it overflows (justify-content:center would push
     overflow above the scroll origin and clip long boss passages). */
  justify-content: flex-start;
  gap: 12px;
  min-width: 0;
  overflow: hidden auto;
}
.ch-main::before { content: ''; margin-top: auto; }
.ch-main::after { content: ''; margin-bottom: auto; }

.challenge-card {
  position: relative;
  padding: 22px 26px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  border-top: 4px solid var(--land-a);
}
.prompt { font-size: clamp(24px, 3vw, 32px); font-weight: 800; line-height: 1.25; }

.passage-card {
  padding: 18px 24px;
  font-size: clamp(22px, 2.6vw, 28px);
  line-height: 1.5;
  font-weight: 600;
  color: var(--white);
  background: rgba(255, 255, 255, 0.16);
  max-height: 38vh;
  overflow-y: auto;
}

/* --- tiles paradigm --- */
.word-clue { display: flex; align-items: center; gap: 14px; font-size: 24px; color: var(--gold-soft); }
.clue-emoji { font-size: 44px; }
.slots { display: flex; gap: 10px; flex-wrap: wrap; }
.slot {
  width: var(--tap); height: var(--tap);
  border-radius: 16px;
  border: 2.5px dashed rgba(255, 255, 255, 0.4);
  background: rgba(255, 255, 255, 0.07);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 34px;
  font-weight: 800;
}
.slot.filled {
  border-style: solid;
  border-color: var(--teal-soft);
  background: rgba(45, 212, 191, 0.22);
  animation: cck-pop-in 0.18s ease;
}
.slot.reveal-fill { border-color: var(--gold); background: rgba(255, 209, 102, 0.25); color: var(--gold-soft); }
@keyframes cck-pop-in {
  from { transform: scale(0.6); }
  to   { transform: scale(1); }
}
.tile-bank { display: flex; gap: 12px; flex-wrap: wrap; }
.tile {
  width: var(--tap); height: var(--tap);
  min-width: var(--tap); min-height: var(--tap);
  border-radius: 18px;
  font-size: 34px;
  font-weight: 800;
  color: var(--ink);
  background: linear-gradient(160deg, var(--white), #ddd6ff);
  border: 1.5px solid rgba(255, 255, 255, 0.7);
  box-shadow: 0 6px 0 rgba(120, 100, 220, 0.45), var(--shadow-soft);
  transition: transform 0.1s ease, opacity 0.2s ease;
}
.tile-used { opacity: 0.18; pointer-events: none; box-shadow: none; }
.tile-back {
  background: linear-gradient(160deg, var(--coral-soft), var(--coral));
  color: #5b1f12;
  font-size: 30px;
}

/* --- choices paradigm --- */
.choices {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
}
.choices.n3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
.choice {
  min-height: 84px;
  min-width: var(--tap);
  padding: 14px 18px;
  border-radius: 20px;
  font-size: clamp(24px, 2.8vw, 32px);
  font-weight: 800;
  color: var(--white);
  background: rgba(255, 255, 255, 0.13);
  border: 2.5px solid rgba(255, 255, 255, 0.3);
  box-shadow: var(--shadow-soft);
  transition: transform 0.1s ease, border-color 0.15s ease, background 0.15s ease;
  word-break: break-word;
}
.choices.big .choice { font-size: clamp(36px, 5vw, 54px); min-height: 100px; }
.choice.picked {
  border-color: var(--teal-soft);
  background: rgba(45, 212, 191, 0.25);
  box-shadow: 0 0 0 4px rgba(126, 240, 226, 0.35), var(--shadow-soft);
}
.choice.is-answer {
  border-color: var(--gold);
  background: rgba(255, 209, 102, 0.28);
  box-shadow: 0 0 0 5px rgba(255, 209, 102, 0.45), var(--shadow-soft);
  animation: cck-answer-glow 0.9s ease-in-out 2;
}
@keyframes cck-answer-glow {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.04); }
}

/* --- feedback / hint / reveal --- */
.feedback {
  font-size: 26px;
  font-weight: 800;
  color: var(--gold);
  text-align: center;
  animation: cck-pop-in 0.25s ease;
}
.hint-card {
  border-radius: 18px;
  padding: 14px 20px;
  background: linear-gradient(135deg, rgba(255, 142, 122, 0.25), rgba(255, 209, 102, 0.22));
  border: 1.5px solid rgba(255, 209, 102, 0.5);
  animation: cck-rise-in 0.3s ease;
}
.hint-card .hint-top { font-size: 22px; font-weight: 700; color: var(--coral-soft); }
.hint-card .hint-line { font-size: 25px; font-weight: 800; color: var(--gold-soft); margin-top: 4px; }
.reveal-card {
  border-radius: 18px;
  padding: 14px 20px;
  background: rgba(255, 209, 102, 0.16);
  border: 1.5px solid rgba(255, 209, 102, 0.55);
  animation: cck-rise-in 0.3s ease;
}
.reveal-card .reveal-top { font-size: 22px; font-weight: 700; color: var(--gold-soft); }
.reveal-card .reveal-line { font-size: 25px; font-weight: 800; margin-top: 4px; }
@keyframes cck-rise-in {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
.soft-flash { animation: cck-soft-flash 0.7s ease; }
@keyframes cck-soft-flash {
  0% { background-color: rgba(255, 255, 255, 0.12); }
  40% { background-color: rgba(126, 240, 226, 0.3); }
  100% { background-color: rgba(255, 255, 255, 0.12); }
}

/* --- boss --- */
.boss-bar {
  display: flex;
  align-items: center;
  gap: 18px;
  padding: 8px 18px;
  border-radius: 20px;
  background: rgba(8, 6, 30, 0.35);
  border: 1.5px solid var(--glass-edge);
}
.golem { width: 96px; height: 96px; flex: 0 0 auto; }
.golem svg { width: 100%; height: 100%; display: block; }
.golem .golem-rig { animation: cck-bob 2.8s ease-in-out infinite; transform-origin: 50% 80%; }
.golem.block .golem-rig { animation: cck-golem-block 0.55s ease; }
@keyframes cck-golem-block {
  0% { transform: translateX(0); }
  25% { transform: translateX(-7px) rotate(-3deg); }
  55% { transform: translateX(6px) rotate(2.5deg); }
  100% { transform: translateX(0); }
}
.golem.hit .golem-rig { animation: cck-golem-hit 0.5s ease; }
@keyframes cck-golem-hit {
  0% { transform: scale(1); }
  35% { transform: scale(0.9) rotate(2deg); }
  100% { transform: scale(1); }
}
.shell { display: flex; gap: 8px; flex: 1; }
.shell-seg {
  flex: 1;
  height: 30px;
  border-radius: 10px;
  background: linear-gradient(150deg, var(--teal-soft), var(--aurora));
  border: 1.5px solid rgba(255, 255, 255, 0.55);
  box-shadow: 0 0 10px rgba(126, 240, 226, 0.45);
  transition: opacity 0.4s ease, transform 0.4s ease;
}
.shell-seg.cracked {
  opacity: 0.22;
  transform: scaleY(0.45);
  background: linear-gradient(150deg, #6f6a9c, #4d4880);
  box-shadow: none;
}
.boss-name { font-size: 22px; font-weight: 800; color: var(--aurora-soft); }

/* ============================================================
   AVATAR
   ============================================================ */
.avatar { width: 170px; height: 230px; }
.avatar svg { width: 100%; height: 100%; display: block; overflow: visible; }
.av-rig { transform-origin: 60px 120px; transform-box: view-box; }
.av-rig.av-idle { animation: cck-bob 2.4s ease-in-out infinite; }
@keyframes cck-bob {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-7px); }
}
.av-pony { transform-origin: 76px 30px; transform-box: view-box; animation: cck-pony 2.4s ease-in-out infinite; }
@keyframes cck-pony {
  0%, 100% { transform: rotate(-4deg); }
  50% { transform: rotate(7deg); }
}
.av-rig.av-cartwheel { animation: cck-cartwheel 1s ease-in-out both; }
@keyframes cck-cartwheel {
  0%   { transform: rotate(0) translateX(0); }
  50%  { transform: rotate(180deg) translateX(-10px) scale(1.04); }
  100% { transform: rotate(360deg) translateX(0); }
}
.av-rig.av-flip { animation: cck-flip 1.05s cubic-bezier(0.34, 1.3, 0.5, 1) both; }
@keyframes cck-flip {
  0%   { transform: translateY(0) rotate(0); }
  20%  { transform: translateY(-12px) rotate(-20deg) scaleY(0.92); }
  60%  { transform: translateY(-72px) rotate(-300deg); }
  85%  { transform: translateY(-6px) rotate(-360deg); }
  100% { transform: translateY(0) rotate(-360deg); }
}
.av-rig.av-stuck { animation: cck-stuck 1.35s ease-in-out both; }
@keyframes cck-stuck {
  0%   { transform: translateY(0) rotate(0); }
  18%  { transform: translateY(-16px) rotate(-30deg) scaleY(0.9); }
  48%  { transform: translateY(-86px) rotate(-380deg) scale(1.06); }
  72%  { transform: translateY(0) rotate(-720deg) scaleY(0.8) scaleX(1.12); }
  84%  { transform: translateY(-10px) rotate(-720deg) scaleY(1.05); }
  100% { transform: translateY(0) rotate(-720deg) scale(1); }
}

/* ============================================================
   CELEBRATION
   ============================================================ */
.screen-celebrate {
  align-items: center;
  justify-content: center;
  gap: 24px;
  text-align: center;
  padding: 28px;
}
.cele-title {
  font-size: clamp(38px, 6vw, 64px);
  font-weight: 800;
  background: linear-gradient(100deg, var(--gold), var(--teal-soft), var(--gold));
  background-size: 220% 100%;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
  animation: cck-shimmer-text 4s linear infinite;
}
.cele-stars { display: flex; gap: 22px; }
.cele-star {
  font-size: 84px;
  line-height: 1;
  opacity: 0.18;
  filter: saturate(0);
  transform: scale(0.7);
  transition: none;
}
.cele-star.lit {
  opacity: 1;
  filter: saturate(1) drop-shadow(0 0 22px rgba(255, 209, 102, 0.8));
  animation: cck-star-pop 0.55s cubic-bezier(0.34, 1.6, 0.5, 1) both;
}
@keyframes cck-star-pop {
  0% { transform: scale(0.2) rotate(-30deg); }
  70% { transform: scale(1.25) rotate(6deg); }
  100% { transform: scale(1) rotate(0); }
}
.cele-egg { font-size: 92px; line-height: 1; }
.cele-egg.wobble { animation: cck-egg-wobble 0.9s ease-in-out infinite; }
@keyframes cck-egg-wobble {
  0%, 100% { transform: rotate(-9deg); }
  50% { transform: rotate(9deg); }
}
.cele-card, .egg-card {
  padding: 22px 34px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  animation: cck-rise-in 0.45s ease both;
}
.cele-card .friend-emoji, .egg-card .friend-emoji { font-size: 76px; animation: cck-bob 2s ease-in-out infinite; }
.cele-card .friend-name, .egg-card .friend-name { font-size: 30px; font-weight: 800; color: var(--gold); }
.cele-card .friend-line, .egg-card .friend-line { font-size: 23px; color: var(--aurora-soft); }
.cele-skip-note { position: absolute; bottom: max(14px, env(safe-area-inset-bottom)); font-size: 18px; color: rgba(247, 245, 255, 0.55); }
.cele-mute {
  position: absolute;
  top: max(12px, env(safe-area-inset-top));
  right: max(14px, env(safe-area-inset-right));
}

/* egg overlay mid-run */
.egg-overlay {
  position: absolute;
  inset: 0;
  z-index: 40;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(13, 11, 42, 0.62);
  -webkit-backdrop-filter: blur(6px);
  backdrop-filter: blur(6px);
  animation: cck-screen-in 0.3s ease both;
}

/* ============================================================
   COLLECTION — Charlie's Friends
   ============================================================ */
.screen-friends { padding: 12px 18px; gap: 10px; }
.friends-top { display: flex; align-items: center; gap: 16px; min-height: 72px; }
.friends-title { font-size: clamp(28px, 4vw, 40px); font-weight: 800; color: var(--gold-soft); }
.friends-grid {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 14px;
  overflow-y: auto;
  padding: 6px 2px 18px;
  align-content: start;
}
.friend {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 16px 10px;
  min-height: 150px;
  justify-content: center;
}
.friend-emoji { font-size: 56px; line-height: 1; }
.friend .bob { animation: cck-bob 2.2s ease-in-out infinite; }
.friend:nth-child(2n) .bob { animation-delay: -1.1s; }
.friend:nth-child(3n) .bob { animation-delay: -0.6s; }
.friend-name { font-size: 19px; font-weight: 800; text-align: center; }
.friend-land { font-size: 15px; color: var(--aurora-soft); }
.friend-shadow .friend-emoji { filter: brightness(0) opacity(0.45); }
.friend-shadow .friend-name { color: rgba(247, 245, 255, 0.45); }

/* ============================================================
   SETTINGS OVERLAY
   ============================================================ */
.overlay {
  position: absolute;
  inset: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(13, 11, 42, 0.6);
  -webkit-backdrop-filter: blur(6px);
  backdrop-filter: blur(6px);
  animation: cck-screen-in 0.25s ease both;
}
.settings-card {
  width: min(440px, 88vw);
  padding: 30px;
  display: flex;
  flex-direction: column;
  gap: 18px;
  align-items: stretch;
  text-align: center;
}
.settings-card h2 { font-size: 32px; font-weight: 800; }
.settings-note { font-size: 20px; color: var(--aurora-soft); line-height: 1.4; }

/* ============================================================
   PORTRAIT LAYOUT
   ============================================================ */
@media (orientation: portrait) {
  .ch-body { flex-direction: column; gap: 6px; }
  .ch-avatar { flex: 0 0 auto; order: 2; padding-bottom: 0; }
  .avatar { width: 120px; height: 160px; }
  .ch-main { order: 1; padding-top: 6px; }
  /* 2 columns keeps all 4 choices above the fold (a single stacked column
     pushed the 4th below it); 72px still well past the 64px tap floor. */
  .choices { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .choices.n3 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .choices.big { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .choice { min-height: 72px; }
  .passage-card { max-height: 26vh; }
  .map-title { font-size: 20px; }
  .boss-bar { flex-wrap: wrap; }
  .cele-star { font-size: 64px; }
}

@media (max-width: 740px) {
  .btn { font-size: 20px; }
  .prompt { font-size: 22px; }
}

/* ============================================================
   REDUCED MOTION — every animation gets a calm alternate
   ============================================================ */
@media (prefers-reduced-motion: reduce) {
  .screen { animation: cck-fade-in 0.4s ease both; }
  @keyframes cck-fade-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .title-gem, .btn-play, .game-title .grad, .cele-title, .btn-travel,
  .cheer.cheer-bounce, .cheer.cheer-peek,
  .friend-emoji.friend-pop, .wm-land.wm-justfreed .wm-float,
  .screen-celebrate.cele-bump, .tv-cloud, .tv-balloon,
  .wm-cloud, .wm-skystar, .wm-aurora, .wm-path, .wm-balloon .wm-float,
  .wm-land .wm-float, .wm-tree, .wm-wave, .wm-snow, .wm-facet, .wm-halo,
  .wm-land[data-state='done'] .wm-doneglow, .wm-land.wm-next .wm-ring,
  .dot.now, .av-pony, .golem .golem-rig, .friend .bob,
  .cele-card .friend-emoji, .egg-card .friend-emoji, .title-spark {
    animation: none;
  }
  .travel-overlay::before { animation: none; opacity: 1; }
  .wm-land, .wm-balloon { transition: none; }
  .av-rig.av-idle { animation: none; }
  .av-rig.av-cartwheel, .av-rig.av-flip, .av-rig.av-stuck {
    animation: cck-gentle-bounce 0.7s ease both;
  }
  @keyframes cck-gentle-bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  .golem.block .golem-rig { animation: cck-dim 0.5s ease; }
  .golem.hit .golem-rig { animation: cck-dim 0.5s ease; }
  @keyframes cck-dim {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.55; }
  }
  .slot.filled, .feedback { animation: cck-fade-in 0.3s ease both; }
  .hint-card, .reveal-card, .cele-card, .egg-card { animation: cck-fade-in 0.35s ease both; }
  .choice.is-answer { animation: none; }
  .cele-star { transition: opacity 0.5s ease, filter 0.5s ease; }
  .cele-star.lit { animation: none; transform: scale(1); }
  .cele-egg.wobble { animation: cck-dim 1.2s ease infinite; }
  .egg-overlay, .overlay { animation: cck-fade-in 0.3s ease both; }
  .soft-flash { animation: cck-fade-in 0.5s ease; }
}

/* ============================================================
   BIG ADVENTURE — route map, visit steps, journal, showtime
   ============================================================ */
.screen-route { overflow: hidden; }
.rm-stage { position: absolute; inset: 0; }
.rm-stage svg { width: 100%; height: 100%; display: block; }
.route-top {
  position: absolute;
  top: max(10px, env(safe-area-inset-top));
  left: 0; right: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 18px;
  z-index: 5;
  pointer-events: none;
}
.route-top .btn { pointer-events: auto; }
.route-title { font-size: clamp(22px, 3.4vw, 34px); font-weight: 800; text-shadow: 0 2px 12px rgba(8, 6, 30, 0.6); }
.route-actions { display: flex; gap: 10px; }
.mail-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 26px;
  height: 26px;
  margin-left: 6px;
  border-radius: 999px;
  background: var(--coral);
  color: #fff;
  font-size: 16px;
  font-weight: 800;
}
.rm-dest { cursor: pointer; transform-box: fill-box; transform-origin: center; transition: scale 0.14s ease; }
.rm-dest.rm-pressed { scale: 0.95; }
.rm-dest .rm-float { animation: cck-island-float 5.6s ease-in-out infinite; }
.rm-dest:nth-of-type(2n) .rm-float { animation-delay: -2.8s; }
.rm-name { font-weight: 800; }
.rm-time { font-weight: 700; opacity: 0.85; }
.rm-thread { animation: cck-twinkle 2.6s ease-in-out infinite; }
.rm-plane { animation: cck-island-float 4.6s ease-in-out infinite; }

/* visit step cards */
.visit-progress {
  height: 8px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.18);
  overflow: hidden;
  flex: 1;
  max-width: 320px;
}
.visit-progress > span { display: block; height: 100%; border-radius: 999px; background: var(--gold); transition: width 0.4s ease; }
.step-card {
  max-width: 620px;
  margin: 0 auto;
  padding: 26px 28px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  align-items: center;
  text-align: center;
}
.step-emoji { font-size: 64px; line-height: 1; }
.step-title { font-size: clamp(26px, 3.6vw, 36px); font-weight: 800; color: var(--gold-soft); }
.step-text { font-size: clamp(20px, 2.8vw, 26px); line-height: 1.45; }
.step-sub { font-size: 18px; color: var(--aurora-soft); line-height: 1.4; }
.phrase-big { font-size: clamp(34px, 5vw, 52px); font-weight: 800; }
.respell {
  padding: 10px 20px;
  border-radius: 14px;
  background: rgba(255, 255, 255, 0.12);
  border: 1.5px solid var(--glass-edge);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 0.04em;
}
.respell.pulse { animation: cck-cheer-peek 0.8s ease; }
.say-btns { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
.frame-banner {
  max-width: 620px;
  margin: 0 auto 10px;
  padding: 12px 18px;
  border-radius: 16px;
  background: linear-gradient(135deg, rgba(255, 209, 102, 0.22), rgba(126, 240, 226, 0.18));
  border: 1.5px solid var(--glass-edge);
  font-size: 19px;
  font-weight: 700;
  text-align: center;
}

/* showtime */
.showtime-stage {
  position: relative;
  flex: 1;
  min-height: 0;
  border-radius: var(--radius);
  overflow: hidden;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  box-shadow: var(--shadow-deep);
}
.showtime-stage .avatar { width: 180px; height: 240px; z-index: 3; margin-bottom: 16px; }
.st-animal { position: absolute; right: 14%; bottom: 22px; font-size: 64px; z-index: 3; }
.st-animal.st-move { animation: cck-cheer-bounce 0.9s ease; }
.st-sky { position: absolute; inset: 0; }
.st-ground { position: absolute; left: 0; right: 0; bottom: 0; height: 26%; }
.st-sun { position: absolute; top: 14%; left: 12%; width: 84px; height: 84px; border-radius: 50%; background: #ffd166; box-shadow: 0 0 60px 24px rgba(255, 209, 102, 0.55); }
.st-deco { position: absolute; inset: 0; pointer-events: none; }
.bg-tci .st-sky { background: linear-gradient(180deg, #ff9a76 0%, #ffd166 55%, #7ef0e2 100%); }
.bg-tci .st-ground { background: linear-gradient(180deg, #ffe9c4, #f5d9a8); }
.bg-tci-night .st-sky { background: linear-gradient(180deg, #0d0b30 0%, #1d1b4b 60%, #16456e 100%); }
.bg-tci-night .st-ground { background: linear-gradient(180deg, #1c3a55, #112638); }
.bg-tci-night .st-sun { background: #f7f5ff; box-shadow: 0 0 40px 14px rgba(126, 240, 226, 0.5); width: 60px; height: 60px; }
.bg-nyc .st-sky { background: linear-gradient(180deg, #f9a8d4 0%, #ffd166 60%, #ffb27a 100%); }
.bg-nyc .st-ground { background: linear-gradient(180deg, #4a3a6e, #33254f); }
.bg-nyc-night .st-sky { background: linear-gradient(180deg, #0d0b30 0%, #2c2766 70%, #4a3a6e 100%); }
.bg-nyc-night .st-ground { background: linear-gradient(180deg, #221a40, #16102e); }
.move-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; padding: 12px 0; }

/* juice.css — toasts, press states, shake/dim. Twilight glass aesthetic:
   indigo base, crystal teal edges, star-gold accents. No external refs. */

/* ---- toast -------------------------------------------------------------- */

.jz-toast-wrap {
  position: fixed;
  top: calc(env(safe-area-inset-top, 0px) + 14px);
  left: 0;
  right: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  pointer-events: none;
  z-index: 9000;
}

.jz-toast {
  max-width: min(86vw, 480px);
  padding: 14px 26px;
  border-radius: 22px;
  font-family: ui-rounded, -apple-system, system-ui, sans-serif;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.01em;
  text-align: center;
  color: #fdf6e3;
  background: linear-gradient(
    155deg,
    rgba(49, 46, 129, 0.92),
    rgba(30, 27, 75, 0.92)
  );
  border: 1.5px solid rgba(94, 234, 212, 0.45);
  box-shadow:
    0 10px 30px rgba(14, 11, 46, 0.45),
    0 2px 8px rgba(14, 11, 46, 0.3),
    inset 0 1px 0 rgba(255, 255, 255, 0.18);
  -webkit-backdrop-filter: blur(12px);
  backdrop-filter: blur(12px);
  opacity: 0;
  transform: translateY(-28px) scale(0.9);
  user-select: none;
  -webkit-user-select: none;
}

.jz-toast-in {
  animation: jz-toast-spring 0.55s cubic-bezier(0.2, 1.4, 0.4, 1) forwards;
}

.jz-toast-out {
  opacity: 1;
  transform: none;
  transition: opacity 0.3s ease, transform 0.3s ease;
  opacity: 0;
  transform: translateY(-16px) scale(0.94);
}

@keyframes jz-toast-spring {
  0% {
    opacity: 0;
    transform: translateY(-32px) scale(0.85);
  }
  60% {
    opacity: 1;
    transform: translateY(4px) scale(1.03);
  }
  100% {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

/* ---- springy press states ------------------------------------------------ */

[data-press] {
  transition:
    transform 0.18s cubic-bezier(0.2, 1.6, 0.4, 1),
    box-shadow 0.18s cubic-bezier(0.2, 1.6, 0.4, 1),
    filter 0.18s ease;
  will-change: transform;
}

[data-press].is-pressed {
  transform: scale(0.93);
  box-shadow:
    0 2px 6px rgba(14, 11, 46, 0.35),
    inset 0 1px 2px rgba(14, 11, 46, 0.2);
  filter: brightness(1.08) saturate(1.05);
}

/* ---- shake (gentle, horizontal) ------------------------------------------ */

.jz-shake {
  animation: jz-shake-soft 0.46s ease-in-out;
}

@keyframes jz-shake-soft {
  0%, 100% { transform: translateX(0); }
  18% { transform: translateX(-7px); }
  38% { transform: translateX(6px); }
  58% { transform: translateX(-4px); }
  78% { transform: translateX(3px); }
}

/* ---- dim (reduced-motion substitute for shake) ---------------------------- */

.jz-dim {
  animation: jz-dim-soft 0.36s ease-in-out;
}

@keyframes jz-dim-soft {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.55; }
}

/* ---- reduced motion overrides --------------------------------------------- */

@media (prefers-reduced-motion: reduce) {
  .jz-toast-in {
    animation: jz-toast-fade 0.25s ease forwards;
  }

  @keyframes jz-toast-fade {
    from { opacity: 0; transform: none; }
    to { opacity: 1; transform: none; }
  }

  .jz-toast-out {
    transition: opacity 0.25s ease;
    transform: none;
  }

  [data-press] {
    transition: filter 0.15s ease;
  }

  [data-press].is-pressed {
    transform: none;
    filter: brightness(1.12);
  }

  .jz-shake {
    animation: none;
  }
}

<body>
<div id="app" class="game-surface"></div>
<canvas id="fx" aria-hidden="true"></canvas>
<script>
'use strict';
(function(){
// === src/content/copy.js ===
// src/content/copy.js — adventure feedback pools (player-facing strings).
// All lines <= 12 words; effort/strategy praise only; no banned words.
const Copy = (() => {
  const correctPool = [
    'You sounded that out!',
    'You spotted it, explorer!',
    'Your brain grew on that one!',
    'You stuck with it — traveler power!',
    'Strong thinking, world explorer!',
    'You checked every choice — great strategy!',
    'All that exploring is paying off!',
    'You took your time and nailed it!',
    'Passport-worthy focus!',
    'You broke it into pieces like a champ!',
  ];
  const missPool = [
    'Tricky one! Hints help explorers.',
    'Brains grow on the hard ones.',
    'Take a breath and try once more.',
    'Tough ones make your brain stronger.',
    'A hint can light the way.',
    "Explorers try again — you've got this.",
    'Shake it off, traveler style. Try again!',
  ];
  const revealPool = [
    'Here it is — look together:',
    'No worries — here is the answer:',
    'That was a toughie. Here it is:',
    'Peek with me — here comes the answer:',
  ];
  const rememberPool = [
    'You remembered! Your journal inks itself in!',
    'That memory stuck with you — wonderful!',
    'You carried that all this way!',
    'A stamp gets shinier somewhere!',
  ];
  // narrative costumes for retrieval beats, by scheduler frame tag
  const frameIntros = {
    reply: 'A letter from your friend! One word got rain-smudged…',
    dispute: 'Your friends cannot agree. You were THERE — help them!',
    brief: 'Your next host wants to hear about your travels!',
    caption: 'Write the back of your postcard — what did you learn?',
  };
  const pickFrom = (rng, arr) => arr[Math.min(arr.length - 1, Math.floor(rng() * arr.length))];
  const ALL_PLAYER_STRINGS = [
    ...correctPool,
    ...missPool,
    ...revealPool,
    ...rememberPool,
    ...Object.values(frameIntros),
  ];
  return {
    correct: (rng) => pickFrom(rng, correctPool),
    miss: (rng) => pickFrom(rng, missPool),
    reveal: (rng) => pickFrom(rng, revealPool),
    remember: (rng) => pickFrom(rng, rememberPool),
    frameIntro: (frame) => frameIntros[frame] || frameIntros.reply,
    ALL_PLAYER_STRINGS,
  };
})();

// === src/content/mathgen.js ===
// src/content/mathgen.js — procedural arithmetic generator.
// Deterministic given the injected rng (() => float in [0,1)).
// Distractors come from plausible slips: ±1, ±10, digit-swap, dropped-regroup.
// Always 3 distractors: unique, >= 0, != answer.
// T1: a+b <= 10. T2: sums <= 20, subtraction within 10.
// T3: subtraction within 20 (start 11-20; T2 owns within-10), three addends <= 20.
// T4: two-digit + one-digit (no regroup), missing addend within 20.
// T5: two-digit ± two-digit (simple regrouping), doubles/halves, groups-of.
const MathGen = (() => {
  const ri = (rng, lo, hi) => lo + Math.floor(rng() * (hi - lo + 1));
  const digitSwap = (n) => {
    if (n < 10 || n > 99) return null;
    const t = Math.floor(n / 10);
    const o = n % 10;
    return t === o ? null : o * 10 + t;
  };
  const shuffleInPlace = (rng, arr) => {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      const tmp = arr[i];
      arr[i] = arr[j];
      arr[j] = tmp;
    }
    return arr;
  };
  const distractorsFor = (rng, answer, extras, exclude) => {
    const banned = exclude || [];
    const pool = [];
    const push = (v) => {
      if (Number.isInteger(v) && v >= 0 && v !== answer && banned.indexOf(v) === -1 && pool.indexOf(v) === -1) pool.push(v);
    };
    (extras || []).forEach(push);
    push(answer + 1);
    push(answer - 1);
    push(answer + 10);
    push(answer - 10);
    push(digitSwap(answer));
    shuffleInPlace(rng, pool);
    const picked = pool.slice(0, 3);
    let k = 2;
    while (picked.length < 3) {
      const v = answer + k;
      if (v >= 0 && v !== answer && banned.indexOf(v) === -1 && picked.indexOf(v) === -1) picked.push(v);
      k += 1;
    }
    return picked;
  };
  const makeItem = (rng, tier, kind, idPart, prompt, answer, extras, hint, explain, big, exclude) => {
    const choices = distractorsFor(rng, answer, extras, exclude).map(String);
    const answerIndex = Math.floor(rng() * (choices.length + 1));
    choices.splice(answerIndex, 0, String(answer));
    return {
      id: 'm-t' + tier + '-' + kind + '-' + idPart,
      domain: 'math',
      tier,
      type: 'choice',
      prompt,
      hint,
      explain,
      choices,
      answerIndex,
      bigChoices: !!big,
      answer, // internal: lets validators verify without parsing the prompt
    };
  };
  const genAdd = (rng, tier, maxSum) => {
    const a = ri(rng, 1, maxSum - 1);
    const b = ri(rng, 1, maxSum - a);
    const ans = a + b;
    return makeItem(
      rng, tier, 'add', a + '-' + b,
      a + ' + ' + b + ' = ?', ans, [],
      'Count up from the bigger number.',
      a + ' + ' + b + ' = ' + ans + ' — count up to check!'
    );
  };
  const genSub = (rng, tier, minStart, maxStart) => {
    const a = ri(rng, minStart, maxStart);
    const b = ri(rng, 1, a - 1);
    const ans = a - b;
    return makeItem(
      rng, tier, 'sub', a + '-' + b,
      a + ' − ' + b + ' = ?', ans, [],
      'Count back on your fingers, slow and steady.',
      a + ' − ' + b + ' = ' + ans + ' — count back to check!'
    );
  };
  const genThree = (rng) => {
    const a = ri(rng, 1, 8);
    const b = ri(rng, 1, 8);
    const c = ri(rng, 1, Math.max(1, 20 - a - b));
    const ans = a + b + c;
    return makeItem(
      rng, 3, 'three', a + '-' + b + '-' + c,
      a + ' + ' + b + ' + ' + c + ' = ?', ans, [],
      'Add the first two, then add the last.',
      a + ' + ' + b + ' + ' + c + ' = ' + ans + '. Step by step!'
    );
  };
  const genTwoPlusOne = (rng) => {
    const tens = ri(rng, 1, 9);
    const ones = ri(rng, 0, 8);
    const t = tens * 10 + ones;
    const o = ri(rng, 1, 9 - ones);
    const ans = t + o;
    return makeItem(
      rng, 4, 'big1', t + '-' + o,
      t + ' + ' + o + ' = ?', ans, [],
      'Only the ones change — add those first.',
      t + ' + ' + o + ' = ' + ans + '. Tens stay, ones grow!'
    );
  };
  const genMissing = (rng) => {
    const total = ri(rng, 6, 20);
    const known = ri(rng, 1, total - 1);
    const ans = total - known;
    // distractors must never equal the visible known/total numbers, or the
    // answer could be ruled out by copying numbers straight from the prompt
    return makeItem(
      rng, 4, 'miss', known + '-' + total,
      '▢ + ' + known + ' = ' + total + '  What goes in the box?', ans, [],
      'Count up from the number to the total.',
      ans + ' + ' + known + ' = ' + total + ' — ' + ans + ' fills the box!',
      false, [known, total]
    );
  };
  const genBigAdd = (rng) => {
    const a = ri(rng, 10, 89);
    const b = ri(rng, 10, 99 - a);
    const ans = a + b;
    const extras = [];
    if ((a % 10) + (b % 10) >= 10) extras.push(ans - 10); // dropped the carry
    return makeItem(
      rng, 5, 'badd', a + '-' + b,
      a + ' + ' + b + ' = ?', ans, extras,
      'Add the tens, then add the ones.',
      a + ' + ' + b + ' = ' + ans + '. Tens, then ones!'
    );
  };
  const genBigSub = (rng) => {
    const a = ri(rng, 21, 99);
    const b = ri(rng, 10, a - 1);
    const ans = a - b;
    const extras = [];
    if (a % 10 < b % 10) {
      // classic slip: take the small ones digit from the big one, skip the borrow
      extras.push((Math.floor(a / 10) - Math.floor(b / 10)) * 10 + Math.abs((a % 10) - (b % 10)));
    }
    return makeItem(
      rng, 5, 'bsub', a + '-' + b,
      a + ' − ' + b + ' = ?', ans, extras,
      'Take away the tens, then the ones.',
      a + ' − ' + b + ' = ' + ans + '. Tens, then ones!'
    );
  };
  const genDouble = (rng) => {
    const n = ri(rng, 2, 12);
    const ans = n + n;
    return makeItem(
      rng, 5, 'dbl', String(n),
      'Double ' + n + ' = ?', ans, [],
      'A double is the number plus itself.',
      'Double ' + n + ' is ' + ans + ' — ' + n + ' plus ' + n + '!'
    );
  };
  const genHalf = (rng) => {
    const half = ri(rng, 1, 10);
    const n = half * 2;
    return makeItem(
      rng, 5, 'half', String(n),
      'Half of ' + n + ' = ?', half, [],
      'Split the number into two matching parts.',
      'Half of ' + n + ' is ' + half + ' — two equal parts!'
    );
  };
  const groupEmojis = ['🍎', '⭐', '🐚', '🍓', '🐠'];
  const genGroups = (rng) => {
    const g = ri(rng, 2, 4);

// === src/content/destinations.js ===
// src/content/destinations.js — aggregator + accessors over destination data.

const Destinations = (() => {
  const list = [
    DestTCI, DestNYC, DestMex, DestRio, DestPar, DestRey,
    DestMar, DestAcc, DestChe, DestTok, DestSyd, DestRot,
  ];
  const byId = {};
  for (const d of list) byId[d.id] = d;

  // factId -> { fact, dest }
  const factIndex = {};
  for (const d of list) {
    for (const f of d.facts) factIndex[f.id] = { fact: f, dest: d };
  }

  // pairId -> [factId, factId] (Golden Threads; validator proves both ends ship)
  const threads = {};
  for (const d of list) {
    for (const f of d.facts) {
      if (f.thread && f.thread.pairId) {
        threads[f.thread.pairId] = threads[f.thread.pairId] || [];
        threads[f.thread.pairId].push(f.id);
      }
    }
  }

  // the connection-format partner of a fact, or null
  const partnerOf = (factId) => {
    const entry = factIndex[factId];
    if (!entry || !entry.fact.thread) return null;
    const pair = threads[entry.fact.thread.pairId] || [];
    const other = pair.find((id) => id !== factId);
    return other ? factIndex[other].fact : null;
  };

  // fact ids for a destination, optionally only up to a given stage
  const factIds = (destId, maxStage) => {
    const d = byId[destId];
    if (!d) return [];
    return d.facts
      .filter((f) => maxStage === undefined || f.stage <= maxStage)
      .map((f) => f.id);
  };

  return { list, byId, factIndex, threads, partnerOf, factIds };
})();

// === src/content/content.js ===
// src/content/content.js — AdvContent: adapts destination data + the math
// generator into servable item shapes (the kingdom item contract: tiles or
// choice, prompt/hint/explain, engine-shuffled at serve time). DOM-free.

const AdvContent = (() => {
  const WORD_HINTS = {
    1: 'Say each sound slowly, then pick its letter.',
    2: 'Listen for letters that team up at the start.',
    3: 'Break it into two chunks and sound out each.',
    4: 'Hunt for letter chunks you already know.',
    5: 'Build it chunk by chunk, like beads on a string.',
  };

  const spell = (word) =>
    word + ' spells ' + word.toLowerCase() + ' — ' + word.toLowerCase().split('').join(', ') + '.';

  // words: destination word entries -> tiles items at the requested tier
  function wordItems(dest, tier) {
    return dest.words
      .filter((w) => w.tier === tier)
      .map((w) => ({
        id: dest.id + '-w-' + w.word,
        domain: 'words',
        tier: w.tier,
        type: 'tiles',
        prompt: 'Build the word!',
        word: w.word,
        emoji: w.emoji,
        clue: w.clue,
        hint: WORD_HINTS[w.tier] || WORD_HINTS[3],
        explain: spell(w.word),
      }));
  }

  // small per-destination pools: rhyme/patterns/reading serve untiered
  function rhymeItems(dest) {
    return dest.rhymes.map((r, i) => Object.assign({
      id: dest.id + '-r-' + i,
      domain: 'rhyme',
      tier: 3,
      type: 'choice',
      bigChoices: false,
    }, r));
  }

  function patternItems(dest) {
    const out = [];
    dest.patterns.forEach((set, si) => {
      set.items.forEach((it, i) => {
        out.push(Object.assign({
          id: dest.id + '-p-' + si + '-' + i,
          domain: 'patterns',
          tier: 3,
          type: 'choice',
          artisan: set.artisan,
          craft: set.name,
        }, it));
      });
    });
    return out;
  }

  function readingItems(dest) {
    const out = [];
    dest.passages.forEach((p, pi) => {
      p.questions.forEach((q, qi) => {
        out.push(Object.assign({
          id: dest.id + '-rd-' + pi + '-' + qi,
          domain: 'reading',
          tier: 3,
          type: 'choice',
          passage: p.passage,
          bigChoices: false,
        }, q));
      });
    });
    return out;
  }

  // bank(destId, domain, tier) -> fresh array of full-shape items
  function bank(destId, domain, tier) {
    const dest = Destinations.byId[destId];
    if (!dest) return [];
    if (domain === 'words') {
      const t = Math.max(1, Math.min(5, Math.round(tier)));
      let items = wordItems(dest, t);
      // nearest-tier fallback so a high-flying reader never starves the bank
      for (let d = 1; d <= 4 && !items.length; d++) {
        items = wordItems(dest, t - d).concat(wordItems(dest, t + d));
      }
      return items;
    }
    if (domain === 'rhyme') return rhymeItems(dest);
    if (domain === 'patterns') return patternItems(dest);
    if (domain === 'reading') return readingItems(dest);
    return [];
  }

  // generate one item (math is procedural; bank domains pick via rng)
  function generate(destId, domain, tier, rng) {
    if (domain === 'math') {
      const it = MathGen.generate(Math.max(1, Math.min(5, Math.round(tier))), rng);
      it.id = destId + '-' + it.id;
      return it;
    }
    const items = bank(destId, domain, tier);
    if (!items.length) return null;
    return items[Math.min(items.length - 1, Math.floor(rng() * items.length))];
  }

  // ---- retrieval beats (knowledge), shaped by the scheduler's format ladder ----
  // fallback pool only — connection decoys prefer places she has actually
  // visited, so every chapter drop enriches the hardest format automatically
  const DECOY_PLACES = ['Cairo', 'Mumbai', 'Toronto', 'Lima', 'Oslo'];

  function pickDecoys(answerName, visitedNames, rng) {
    const pool = (visitedNames || []).filter((n) => n && n !== answerName);
    // shuffle the visited pool with the run's rng
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      const t = pool[i]; pool[i] = pool[j]; pool[j] = t;
    }
    const picks = pool.slice(0, 2);
    for (const d of DECOY_PLACES) {
      if (picks.length >= 2) break;
      if (d !== answerName && picks.indexOf(d) === -1) picks.push(d);
    }
    return picks;
  }

  function retrievalItem(factId, format, rng, visitedNames) {
    const entry = Destinations.factIndex[factId];
    if (!entry) return null;
    const f = entry.fact;
    const base = {
      factId,
      domain: 'knowledge',
      tier: 1,
      hint: f.cued.prompt,
      explain: f.text,
    };
    if (format === 'recognition') {
      return Object.assign(base, {
        id: factId + '-rec',
        type: 'choice',
        prompt: f.recognition.prompt,
        choices: f.recognition.choices.slice(),
        answerIndex: f.recognition.answerIndex,
        hint: f.recognition.hint,
        explain: f.recognition.explain,
      });
    }
    if (format === 'cued' || format === 'tiles') {
      return Object.assign(base, {
        id: factId + '-' + format,
        type: 'tiles',
        prompt: f.cued.prompt,
        word: f.cued.answer.toUpperCase().replace(/[^A-Z]/g, ''),
        emoji: f.tiles.emoji,
        clue: f.tiles.clue,
        prefill: format === 'cued' ? 1 : 0, // cued recall: first letter given
      });
    }
    // connection: which other place shares this thread?
    const partner = Destinations.partnerOf(factId);
    if (!partner) return retrievalItem(factId, 'tiles', rng, visitedNames);
    const otherDest = Destinations.factIndex[partner.id].dest;
    const decoys = pickDecoys(otherDest.name, visitedNames, rng);
    const choices = [otherDest.name].concat(decoys);
    return Object.assign(base, {
      id: factId + '-conn',
      type: 'choice',
      prompt: 'Which other place we visited shares this?',
      passage: f.text, // the fact rides above the question like a passage card
      choices,
      answerIndex: 0,
      hint: 'Think about who travels between the two.',
      explain: partner.text,
      thread: f.thread ? f.thread.pairId : '',
    });
  }

  return { bank, generate, retrievalItem };
})();

// === src/engine/adaptive.js ===
const Adaptive = (() => {
  // Ability deltas per resolution outcome (contract: first/hinted/miss/repaired).
  // first-try step retuned from the brief's +0.34 after simulation (R5):
  // with 4-choice items, above-skill success can't drop below the ~25%
  // guessing floor, so descent is rate-capped and a +0.34 climb forces a
  // majority of serves above true skill (rolling first-try ~50%, vs the
  // mission's 70-80%). +0.12 puts equilibrium at ~73-76%. See DECISIONS.md.
  const DELTA = { first: 0.12, hinted: 0.10, miss: -0.5, repaired: 0.10 };

  function clamp(x) {
    const n = Number(x);
    if (!Number.isFinite(n)) return 1;
    return Math.min(5, Math.max(1, n));
  }

  function tierFor(ability) {
    return Math.min(5, Math.max(1, Math.round(clamp(ability))));
  }

  function update(ability, outcome) {
    const d = Object.prototype.hasOwnProperty.call(DELTA, outcome) ? DELTA[outcome] : 0;
    return clamp(clamp(ability) + d);
  }

  return {
    START: { words: 2.5, reading: 2.5, rhyme: 2.0, math: 1.5, patterns: 1.5 },
    DELTA,
    clamp,
    tierFor,
    update,
  };
})();

// === src/engine/scheduler.js ===
// src/engine/scheduler.js — the knowledge memory model (pure, DOM-free).
//
// Facts are not skills: there is no tier-5 of "knows Turks and Caicos".
// Each fact atom carries a memory strength 0-3 and a session-index due
// counter. The collection surfaces (journal ink, stamp shine) read strength;
// retrieval beats are served by demand (most overdue first), never as a
// backlog. Spec: ADVENTURE_BRIEF.md "The Learning Model".
//
// Rules implemented here, verified by test/scheduler.test.js:
//  - Box-0: first contact is presentation-only (introduce); a fact is never
//    questioned in the same session it was introduced.
//  - Intervals by strength AFTER a success: 1, 4, 10, 20 sessions.
//  - Same-day clamp: promotion to strength 3 requires the previous success
//    to have happened on an earlier calendar day (sleep consolidation);
//    a same-day success re-schedules but does not promote past 2.
//  - Miss: -1 strength with a floor of 1 once established (never back to 0),
//    due again next session. Nothing is ever erased.
//  - Active cap: at most ACTIVE_CAP facts active (introduced, strength < 3);
//    introduce() defers when full — dormant facts simply wait their turn.
//  - Format ladder by strength: 0-1 recognition -> 1 cued (first-letter)
//    -> 2 tiles (full recall spelling) -> 3 connection (only when the
//    partner fact is also strength >= 2; falls back to tiles).
//  - Frame rotation: each serve rotates the narrative costume
//    (reply / dispute / brief / caption) so retrieval never wears the same
//    one twice running.

const Scheduler = (() => {
  const INTERVALS = [1, 4, 10, 20]; // next due offset by post-success strength
  const ACTIVE_CAP = 40;
  const FRAMES = ['reply', 'dispute', 'brief', 'caption'];

  // state shape: { [factId]: { s, due, last, lastDay, introduced, frame } }
  function freshFact() {
    return { s: 0, due: 0, last: -1, lastDay: '', introduced: -1, frame: '' };
  }

  function create(stateIn) {
    const state = stateIn || {};

    const get = (id) => {
      if (!state[id]) state[id] = freshFact();
      return state[id];
    };

    const activeCount = () =>
      Object.keys(state).filter((id) => {
        const f = state[id];
        return f.introduced >= 0 && f.s < 3;
      }).length;

    // Box-0 presentation. Returns true when the fact was activated, false
    // when the active cap deferred it (caller presents it another day).
    function introduce(factId, session) {
      const f = get(factId);
      if (f.introduced >= 0) return true; // already met
      if (activeCount() >= ACTIVE_CAP) return false;
      f.introduced = session;
      f.s = 0;
      f.due = session + 1; // first retrieval no earlier than next session
      return true;
    }

    function introducedIds() {
      return Object.keys(state).filter((id) => state[id].introduced >= 0);
    }

    // Demand-aware serve list: due facts, most overdue first, never a fact
    // introduced this same session (box-0), capped at `limit`.
    function due(session, limit) {
      const ids = introducedIds().filter((id) => {
        const f = state[id];
        return f.s < 3 || f.due <= session; // strength-3 facts still revisit at 20
      }).filter((id) => {
        const f = state[id];
        return f.due <= session && f.introduced < session;
      });
      ids.sort((a, b) => (state[a].due - state[b].due) || (a < b ? -1 : 1));
      return ids.slice(0, Math.max(0, limit === undefined ? 6 : limit));
    }

    function recordSuccess(factId, session, dayKey) {
      const f = get(factId);
      let next = Math.min(3, f.s + 1);
      // same-day clamp: reaching 3 requires the prior success on an earlier day
      if (next === 3 && f.lastDay && f.lastDay === dayKey) next = 2;
      f.s = next;
      f.last = session;
      f.lastDay = dayKey || '';
      f.due = session + INTERVALS[Math.min(f.s, INTERVALS.length - 1)];
      return f.s;
    }

    function recordMiss(factId, session) {
      const f = get(factId);
      f.s = f.s >= 1 ? Math.max(1, f.s - 1) : 0;
      f.last = session;
      f.due = session + 1;
      return f.s;
    }

    // partnerStrength: strength of the connection item's other endpoint
    // (pass -1 / undefined when the fact has no connection item authored).
    function formatFor(factId, partnerStrength) {
      const f = get(factId);
      if (f.s <= 0) return 'recognition';
      if (f.s === 1) return 'cued';
      if (f.s === 2) return 'tiles';
      return (typeof partnerStrength === 'number' && partnerStrength >= 2)
        ? 'connection'
        : 'tiles';
    }

    // Rotate the narrative frame: never the same costume twice running.
    function nextFrame(factId, rng) {
      const f = get(factId);
      const pool = FRAMES.filter((fr) => fr !== f.frame);
      const pick = pool[Math.min(pool.length - 1, Math.floor((rng ? rng() : 0) * pool.length))];
      f.frame = pick;
      return pick;
    }

    function strengthOf(factId) {
      const f = state[factId];
      return f ? f.s : 0;
    }

    function isIntroduced(factId) {
      const f = state[factId];
      return !!f && f.introduced >= 0;
    }

    // Stamp shine for a destination: 0 none, 1 line art (visited),
    // 2 full color (all introduced facts >= 1), 3 gold (all at 3).
    function stampShine(factIds, visited) {
      if (!visited) return 0;
      const met = factIds.filter((id) => isIntroduced(id));
      if (!met.length) return 1;
      const strengths = met.map((id) => strengthOf(id));
      if (strengths.every((s) => s >= 3) && met.length === factIds.length) return 3;
      if (strengths.every((s) => s >= 1)) return 2;
      return 1;
    }

    return {
      state,
      introduce,
      due,
      recordSuccess,
      recordMiss,
      formatFor,
      nextFrame,
      strengthOf,
      isIntroduced,
      activeCount,
      stampShine,
    };
  }

  return { INTERVALS, ACTIVE_CAP, FRAMES, create };
})();

// === src/engine/persist.js ===
// src/engine/persist.js — versioned save layer for Charlie's Big Adventure.
// Same hardening as the kingdom game: probe-validated storage with an
// in-memory fallback, never throws, unknown/corrupt schema -> null (caller
// resets). Adventure schema v1:
//   { v: 1, abilities, sessions, lastDay, facts, visits, phrases,
//     souvenirs, friends, photos, settings }
// facts:   { [factId]: { s, due, last, lastDay, introduced, frame } }
// visits:  { [destId]: { done: bool, returns: int } }
// phrases: { [phraseId]: { heard: int, built: int } }
// photos:  capped FIFO (newest kept) so storage never grows unbounded.
const Persist = (() => {
  const KEY = 'cba-save';
  const DOMAIN_KEYS = ['words', 'reading', 'rhyme', 'math', 'patterns'];
  const PHOTO_CAP = 60;

  function memoryStorage() {
    const mem = new Map();
    return {
      getItem(k) { return mem.has(k) ? mem.get(k) : null; },
      setItem(k, v) { mem.set(k, String(v)); },
      removeItem(k) { mem.delete(k); },
    };
  }

  function probe(storage) {
    try {
      const k = KEY + ':probe';
      storage.setItem(k, '1');
      const ok = storage.getItem(k) === '1';
      if (typeof storage.removeItem === 'function') storage.removeItem(k);
      return ok;
    } catch (e) {
      return false;
    }
  }

  function valid(data) {
    if (!data || typeof data !== 'object' || Array.isArray(data)) return false;
    if (data.v !== 1) return false;
    if (!data.abilities || typeof data.abilities !== 'object') return false;
    for (let i = 0; i < DOMAIN_KEYS.length; i++) {
      const a = data.abilities[DOMAIN_KEYS[i]];
      if (typeof a !== 'number' || !Number.isFinite(a)) return false;
    }
    if (!Number.isInteger(data.sessions) || data.sessions < 0) return false;
    if (!data.facts || typeof data.facts !== 'object' || Array.isArray(data.facts)) return false;
    if (!data.visits || typeof data.visits !== 'object' || Array.isArray(data.visits)) return false;
    if (!data.phrases || typeof data.phrases !== 'object' || Array.isArray(data.phrases)) return false;
    if (!Array.isArray(data.souvenirs)) return false;
    if (!Array.isArray(data.friends)) return false;
    if (!Array.isArray(data.photos)) return false;
    if (!data.settings || typeof data.settings !== 'object') return false;
    return true;
  }

  function createStore(storageLike) {
    let candidate = storageLike;
    if (candidate === undefined) {
      try { candidate = globalThis.localStorage; } catch (e) { candidate = undefined; }
    }
    let backing;
    let available = false;
    if (candidate && probe(candidate)) {
      backing = candidate;
      available = true;
    } else {
      backing = memoryStorage();
      available = false;
    }
    return {
      available,
      load() {
        try {
          const raw = backing.getItem(KEY);
          if (raw === null || raw === undefined) return null;
          const data = JSON.parse(raw);
          return valid(data) ? data : null;
        } catch (e) {
          return null;
        }
      },
      save(state) {
        try {
          const s = state || {};
          const photos = Array.isArray(s.photos) ? s.photos.slice(-PHOTO_CAP) : [];
          const payload = {
            v: 1,
            abilities: s.abilities,
            sessions: s.sessions,
            lastDay: s.lastDay || '',
            facts: s.facts,
            visits: s.visits,
            phrases: s.phrases,
            souvenirs: s.souvenirs,
            friends: s.friends,
            photos,
            settings: s.settings,
            // optional companions of the save (older saves simply lack them)
            crumbs: s.crumbs || { met: false, bombed: [] },
            threadsSeen: Array.isArray(s.threadsSeen) ? s.threadsSeen : [],
          };
          backing.setItem(KEY, JSON.stringify(payload));
          mirrorWrite(payload); // best-effort second copy in IndexedDB
          return true;
        } catch (e) {
          return false;
        }
      },
    };
  }

  // ---- IndexedDB mirror -----------------------------------------------------
  // localStorage remains the synchronous source of truth; every save is also
  // mirrored to IndexedDB (fire-and-forget). At boot, restoreFromMirror()
  // adopts the IDB copy ONLY when it has a higher sessions counter — the
  // defense against iPadOS evicting one store but not the other.
  const DB_NAME = 'cba-mirror';
  const DB_STORE = 'save';

  function idbOpen() {
    return new Promise((resolve, reject) => {
      let req;
      try {
        if (typeof globalThis.indexedDB === 'undefined') return resolve(null);
        req = globalThis.indexedDB.open(DB_NAME, 1);
      } catch (e) {
        return resolve(null);
      }
      req.onupgradeneeded = () => {
        try { req.result.createObjectStore(DB_STORE); } catch (e) { /* exists */ }
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => resolve(null); // mirror is best-effort, never fatal
      req.onblocked = () => resolve(null);
    });
  }

  function mirrorWrite(state) {
    idbOpen().then((db) => {
      if (!db) return;
      try {
        const tx = db.transaction(DB_STORE, 'readwrite');
        tx.objectStore(DB_STORE).put(JSON.stringify(state), KEY);
        tx.oncomplete = () => db.close();
        tx.onerror = () => db.close();
      } catch (e) { /* best-effort */ }
    }).catch(() => {});
  }

  function mirrorRead() {
    return idbOpen().then((db) => new Promise((resolve) => {
      if (!db) return resolve(null);
      try {
        const tx = db.transaction(DB_STORE, 'readonly');
        const req = tx.objectStore(DB_STORE).get(KEY);
        req.onsuccess = () => {
          db.close();
          try {
            const data = JSON.parse(req.result);
            resolve(valid(data) ? data : null);
          } catch (e) {
            resolve(null);
          }
        };
        req.onerror = () => { db.close(); resolve(null); };
      } catch (e) {
        resolve(null);
      }
    })).catch(() => null);
  }

  // Adopt the freshest copy before the engine boots. Resolves always.
  function restoreFromMirror(storageLike) {
    let candidate = storageLike;
    if (candidate === undefined) {
      try { candidate = globalThis.localStorage; } catch (e) { candidate = undefined; }
    }
    return mirrorRead().then((mirror) => {
      if (!mirror || !candidate) return false;
      try {
        let local = null;
        try { local = JSON.parse(candidate.getItem(KEY)); } catch (e) { local = null; }
        const localSessions = local && valid(local) ? local.sessions : -1;
        if (mirror.sessions > localSessions) {
          candidate.setItem(KEY, JSON.stringify(mirror));
          return true;
        }
      } catch (e) { /* keep local */ }
      return false;
    }).catch(() => false);
  }

  // ---- the suitcase: kid-themed save export/import --------------------------
  // pack() -> a copyable code string; unpack(code) -> state|null. Unicode-safe.
  function pack(state) {
    try {
      const json = JSON.stringify(state);
      return 'CBA1.' + btoaSafe(json);
    } catch (e) {
      return '';
    }
  }

  function unpack(code) {
    try {
      const s = String(code || '').trim();
      if (!s.startsWith('CBA1.')) return null;
      const data = JSON.parse(atobSafe(s.slice(5)));
      return valid(data) ? data : null;
    } catch (e) {
      return null;
    }
  }

  function btoaSafe(s) {
    if (typeof globalThis.btoa === 'function') {
      return globalThis.btoa(unescape(encodeURIComponent(s)));
    }
    return globalThis.Buffer.from(s, 'utf8').toString('base64'); // Node tests
  }

  function atobSafe(s) {
    if (typeof globalThis.atob === 'function') {
      return decodeURIComponent(escape(globalThis.atob(s)));
    }
    return globalThis.Buffer.from(s, 'base64').toString('utf8'); // Node tests
  }

  return { KEY, PHOTO_CAP, createStore, restoreFromMirror, mirrorWrite, pack, unpack };
})();

// === src/engine/visit.js ===
// src/engine/visit.js — the visit run state machine (pure, DOM-free).
// A visit is an ordered queue of typed steps the UI walks:
//   arrival | phrase | wonder | skill | fact | retrieval | friend |
//   souvenir | landmark | showtime
// Skill steps reuse the proven kingdom mechanics: hint -> retry -> friendly
// reveal, ability staircase (+0.12/+0.10/-0.5), one same-tier sibling requeue
// 3-5 steps later. Retrieval steps feed the knowledge scheduler. Composition
// rules per ADVENTURE_BRIEF: facts staged 4 on first visit + 2 per return,
// box-0 presentation-only, <=1 retrieval beat per 3 skill items, friend at
// challenge 3, souvenir at challenge 6.

const Visit = (() => {
  const SKILL_DOMAINS = ['words', 'rhyme', 'math', 'patterns', 'reading'];

  function shuffled(list, rng) {
    const a = list.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      const t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  function shuffleTiles(word, rng) {
    const letters = String(word).split('');
    if (letters.length < 2) return letters;
    if (letters.length === 2) return [letters[1], letters[0]];
    let distinct = false;
    for (let i = 1; i < letters.length; i++) if (letters[i] !== letters[0]) { distinct = true; break; }
    if (!distinct) return letters.slice();
    let tiles = shuffled(letters, rng);
    let guard = 0;
    while (tiles.join('') === word && guard++ < 50) tiles = shuffled(letters, rng);
    if (tiles.join('') === word) tiles = letters.slice(1).concat(letters[0]);
    return tiles;
  }

  // serve-time copy: shuffle tiles / choices, remap answer indices
  function serve(base, rng) {
    const item = Object.assign({}, base);
    if (item.type === 'tiles') {
      item.tiles = shuffleTiles(item.word, rng);
    } else if (Array.isArray(base.choices)) {
      const order = shuffled(base.choices.map((_, i) => i), rng);
      item.choices = order.map((i) => base.choices[i]);
      if (Array.isArray(base.answerIndices)) {
        item.answerIndices = base.answerIndices.map((a) => order.indexOf(a)).sort((x, y) => x - y);
        delete item.answerIndex;
      } else {
        item.answerIndex = order.indexOf(base.answerIndex);
      }
    }
    return item;
  }

  // ---- composition ---------------------------------------------------------

  // Insert `extra` after the skill step at 1-based skill position `afterSkill`.
  function insertAfterSkill(steps, afterSkill, extra) {
    let count = 0;
    for (let i = 0; i < steps.length; i++) {
      if (steps[i].type === 'skill') {
        count += 1;
        if (count === afterSkill) {
          steps.splice(i + 1, 0, extra);
          return true;
        }
      }
    }
    steps.push(extra);
    return false;
  }

  function composeSteps(ctx, dest, kind, returns) {
    const rng = ctx.rng;
    const steps = [];
    const first = kind === 'first';

    // skill slots: 3 domains round-robin across 8 (first) / 7 (return) slots
    const domains = shuffled(SKILL_DOMAINS, rng).slice(0, 3);
    const slotCount = first ? 8 : 7;
    for (let i = 0; i < slotCount; i++) {
      steps.push({ type: 'skill', domain: domains[i % domains.length] });
    }

    // facts: stage 0 on the first visit, then everything not yet met up to
    // stage `returns+1` (capped 2), lowest stage first — a fact deferred at
    // the active cap is reconsidered on every later visit, never stranded
    const stage = first ? 0 : Math.min(2, returns + 1);
    const facts = dest.facts
      .filter((f) => f.stage <= stage && !ctx.scheduler.isIntroduced(f.id))
      .sort((a, b) => a.stage - b.stage);
    const factSlots = first ? [2, 4, 6, 8] : [2, 5];
    facts.slice(0, factSlots.length).forEach((f, i) => {
      insertAfterSkill(steps, factSlots[i], { type: 'fact', fact: f });
    });

    // retrieval beats ride along on EVERY visit (the mail travels with her):
    // returns prefer this destination's due facts; first visits carry other
    // destinations' due mail. Hard cap 2 (<=1 per 3 skill items either way).
    {
      const destIds = new Set(dest.facts.map((f) => f.id));
      const due = ctx.scheduler.due(ctx.session, 6);
      const mine = due.filter((id) => destIds.has(id));
      const others = due.filter((id) => !destIds.has(id));
      const picks = (first ? others : mine.concat(others)).slice(0, 2);
      picks.forEach((factId, i) => {
        insertAfterSkill(steps, i === 0 ? 3 : 6, { type: 'retrieval', factId });
      });
    }

    // friend + souvenir cadence (challenge 3 and 6)
    if (first) {
      insertAfterSkill(steps, 3, { type: 'friend', animal: dest.animal });
      insertAfterSkill(steps, 6, { type: 'souvenir', souvenir: dest.souvenirs[0] });
    } else if (returns === 0) {
      insertAfterSkill(steps, 3, { type: 'friend', animal: dest.shyAnimal });
      insertAfterSkill(steps, 6, { type: 'souvenir', souvenir: dest.souvenirs[1] });
    }

    // bookends
    if (first) {
      steps.unshift({ type: 'wonder', wonder: dest.wonder });
      steps.unshift({ type: 'phrase', phrase: dest.phrases[0] });
      steps.unshift({ type: 'arrival', dest: { id: dest.id, name: dest.name }, kid: dest.hostKid });
      // the curiosity loop closes before the landmark: wonder answered
      steps.push({ type: 'wonder-answer', wonder: dest.wonder });
      steps.push({ type: 'landmark', landmark: dest.landmark });
    } else {
      const p = dest.phrases[Math.min(returns + 1, dest.phrases.length - 1)];
      steps.unshift({ type: 'phrase', phrase: p });
      // a return-only micro-vignette guarantees one novel beat per revisit
