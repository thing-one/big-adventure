          '<div class="stamp-ring shine-' + s.shine + '">' + esc(s.emoji) + '</div>' +
          '<span class="friend-name">' + esc(s.name) + '</span>' +
          '<span class="step-sub">' + esc(s.note) + '</span>' +
          '</div>';
      }
      body += '</div>';
    } else if (view.tab === 'facts') {
      // grouped by visited destination — never a wall of blank cards
      body = '';
      for (const g of view.factGroups || []) {
        body +=
          '<div class="journal-group-head">' +
          '<span class="step-emoji">' + esc(g.emoji) + '</span>' +
          '<span class="friend-name">' + esc(g.destName) + '</span>' +
          '<span class="friends-count">' + g.inked + ' of ' + g.total + ' pages inked</span>' +
          '</div>';
        for (const f of g.rows) {
          body +=
            '<div class="card fact-page ' + f.state + '">' +
            '<span class="step-emoji">' + esc(f.emoji) + '</span>' +
            '<div><div class="fact-ink">' + esc(f.line) + '</div></div>' +
            (f.fresh ? '<span class="ink-chip">✨ New ink!</span>' : '') +
            '</div>';
        }
      }
      if (view.teaserCount) {
        body += '<div class="card fact-page blank"><span class="step-emoji">✈️</span>' +
          '<div class="fact-ink">' + view.teaserCount + ' more lands wait for your visit…</div></div>';
      }
    } else if (view.tab === 'photos') {
      body = '<div class="stamp-row">';
      for (const p of view.photos) {
        body +=
          '<div class="card photo-card">' +
          '<span class="photo-strip">' + esc(p.strip) + (p.crumbs ? ' <span class="crumbs-bomb">🐦</span>' : '') + '</span>' +
          '<span class="friend-name">' + esc(p.title) + '</span>' +
          (p.caption ? '<span class="step-sub">📬 ' + esc(p.caption) + '</span>' : '') +
          '<span class="step-sub">' + esc(p.sub) + '</span>' +
          '</div>';
      }
      body += (view.photos.length ? '' : '<p class="step-sub">Your Showtime photos will live here!</p>') + '</div>';
      if (view.crumbsCount) {
        body += '<p class="step-sub crumbs-flock">🐦 Crumbs the pigeon snuck into ' + view.crumbsCount +
          (view.crumbsCount === 1 ? ' photo' : ' photos') + '!</p>';
      }
    } else if (view.tab === 'hello' && view.build) {
      body = phraseCard(view.build, { backTab: true });
    } else {
      body = '';
      for (const h of view.hellos) {
        body +=
          '<div class="card hello-row" data-hello="' + esc(h.id) + '">' +
          '<span class="hello-word">' + esc(h.text) + (h.built ? ' <span class="ink-chip">⭐ Built!</span>' : '') + '</span>' +
          '<span class="respell">' + esc(h.respell) + '</span>' +
          '<button class="btn" data-action="hello-say" data-id="' + esc(h.id) + '" data-press>🔊</button>' +
          '<button class="btn" data-action="hello-slow" data-id="' + esc(h.id) + '" data-press>🐢</button>' +
          '<button class="btn" data-action="hello-build" data-id="' + esc(h.id) + '" data-press>🧩 Build it!</button>' +
          '</div>';
      }
      if (!view.hellos.length) body = '<p class="step-sub">Greetings you learn will live here!</p>';
    }
    el.innerHTML =
      '<section class="screen screen-journal">' +
      '<header class="journal-top">' +
      '<button class="btn btn-ghost" data-action="back-map" data-press>🌍 Map</button>' +
      '<h1 class="journal-title">Travel Journal</h1>' +
      '<div class="journal-tabs">' + tabBtns + '</div>' +
      '</header>' +
      '<div class="journal-body">' + body + '</div>' +
      '</section>';
  }

  // ---------- settings overlay ----------
  function settings(host, opts) {
    const o = opts || {};
    let voices = '';
    for (const v of o.voices || []) {
      voices += '<p class="settings-note">' + esc(v.label) + ': ' + (v.ok ? '✅ real voice' : '🔤 sound-it-out card') + '</p>';
    }
    const wrap = document.createElement('div');
    wrap.className = 'overlay';
    wrap.setAttribute('data-settings-overlay', '');
    wrap.innerHTML =
      '<div class="card settings-card">' +
      '<h2>Settings</h2>' +
      '<button class="btn btn-big" data-action="toggle-mute" data-press data-mute-btn>' +
      (o.muted ? '🔇 Sound is off' : '🔊 Sound is on') + '</button>' +
      '<p class="settings-note"><strong>Voices on this iPad</strong></p>' +
      voices +
      '<p class="settings-note">Visit a place again — its stamp keeps shining!</p>' +
      '<p class="settings-note"><strong>🧳 The suitcase</strong> (grown-ups: a spare copy of all progress)</p>' +
      '<div class="say-btns">' +
      '<button class="btn" data-action="suitcase-pack" data-press>🧳 Pack</button>' +
      '<button class="btn" data-action="suitcase-unpack" data-press>📂 Unpack</button>' +
      '</div>' +
      '<textarea class="suitcase-code" data-suitcase rows="3" hidden placeholder="Paste a suitcase code here, then tap Unpack"></textarea>' +
      '<button class="btn btn-primary" data-action="close-settings" data-press>Done</button>' +
      '</div>';
    host.appendChild(wrap);
    return wrap;
  }

  // ---------- challenge helpers (kingdom contract) ----------
  function setSlot(root, idx, letter) {
    const slot = root.querySelector('[data-slot="' + idx + '"]');
    if (!slot) return;
    slot.textContent = letter || '';
    slot.classList.toggle('filled', !!letter);
  }

  function fillSlotsWith(root, word) {
    const slots = root.querySelectorAll('[data-slot]');
    for (let i = 0; i < slots.length; i++) {
      slots[i].textContent = word[i] || '';
      slots[i].classList.add('filled', 'reveal-fill');
    }
  }

  function showFeedback(root, text) {
    const f = root.querySelector('[data-feedback]');
    if (!f) return;
    f.textContent = text;
    f.hidden = false;
  }

  function scrollNoteIntoView(el) {
    try {
      if (!el || !el.scrollIntoView) return;
      let smooth = true;
      try { smooth = !Juice.reducedMotion(); } catch (e) { /* default smooth */ }
      el.scrollIntoView({ block: 'nearest', behavior: smooth ? 'smooth' : 'auto' });
    } catch (e) { /* never break the retry flow over a scroll */ }
  }

  function showHint(root, missText, hintText) {
    const h = root.querySelector('[data-hint]');
    if (!h) return;
    root.querySelector('[data-hint-top]').textContent = missText;
    root.querySelector('[data-hint-line]').textContent = hintText;
    h.hidden = false;
    scrollNoteIntoView(h);
  }

  function showReveal(root, revealText, explainText) {
    const r = root.querySelector('[data-reveal]');
    if (!r) return;
    const h = root.querySelector('[data-hint]');
    if (h) h.hidden = true;
    root.querySelector('[data-reveal-top]').textContent = revealText;
    root.querySelector('[data-reveal-line]').textContent = explainText;
    r.hidden = false;
    scrollNoteIntoView(r);
  }

  function clearNotes(root) {
    for (const sel of ['[data-feedback]', '[data-hint]', '[data-reveal]']) {
      const n = root.querySelector(sel);
      if (n) n.hidden = true;
    }
  }

  function markChoiceAnswer(root, answer) {
    const idxs = Array.isArray(answer) ? answer : [answer];
    for (const i of idxs) {
      const btn = root.querySelector('[data-choice="' + i + '"]');
      if (btn) btn.classList.add('is-answer');
    }
  }

  return {
    title, route, visitShell, setProgress,
    stepArrival, stepPhrase, stepWonder, stepWonderAnswer, stepFact, stepFriend, stepSouvenir, stepLandmark, stepVignette,
    challenge, showtime, journal, journalClose, settings, leaveConfirm, phraseCard,
    setSlot, fillSlotsWith, showFeedback, showHint, showReveal, clearNotes, markChoiceAnswer,
    muteIcon,
  };
})();

// === src/ui/main.js ===
// Main — wires engine, content, speech, audio, particles, route map, avatar
// and screens together. Owns the rAF loop, routing, delegated events, and the
// outcome -> audio/particles/toast mapping (the kingdom's proven beats).

const Main = (() => {
  let app = null;
  let game = null;
  let run = null;
  let screen = 'title';
  let curView = null;
  let visitDest = null;      // destination data for the active run (null = mailbag)
  let busy = false;
  let slotsArr = [];
  let prefillCount = 0;
  let selection = [];
  let pendingSubmitTimer = 0;
  let landmarkBeat = 0;
  let showMoves = [];        // showtime choreography
  let photoTaken = false;
  let settingsEl = null;
  let leaveEl = null;        // mid-visit leave confirmation overlay
  let journalTab = 'stamps';
  let buildPhrase = null;    // Hello Book "Build it!" target
  let echoState = null;      // echo-trace progress {phrase, total, next, active}
  let trailUntil = 0;
  let lastTs = 0;
  let rafActive = false;     // the rAF loop sleeps when there is nothing to draw
  let runInked = [];         // factIds inked during the active run (journal close)
  const sessionInked = new Set(); // inked this session ("New ink!" chips)
  let closeView = null;      // pending journal-close screen data
  let pendingChapterToast = '';
  let mapChapter = -1;       // which continent page the map shows (-1 = follow the plane)

  const timers = [];
  function timer(ms, fn) {
    const id = setTimeout(() => {
      const i = timers.indexOf(id);
      if (i > -1) timers.splice(i, 1);
      fn();
    }, ms);
    timers.push(id);
    return id;
  }
  function clearTimers() {
    while (timers.length) clearTimeout(timers.pop());
    if (pendingSubmitTimer) {
      clearTimeout(pendingSubmitTimer);
      pendingSubmitTimer = 0;
    }
  }

  function isMuted() {
    return !!(game && game.state.settings && game.state.settings.muted);
  }
  function reduced() {
    try { return Juice.reducedMotion(); } catch (e) { return false; }
  }
  function centerOf(el) {
    if (el) {
      const r = el.getBoundingClientRect();
      if (r.width || r.height) return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
    }
    return { x: window.innerWidth / 2, y: window.innerHeight / 2 };
  }

  // speak with graceful fallback: real voice when allowlisted + installed,
  // otherwise the English voice reads the respelling; silence pulses the card
  function sayPhrase(p, slow) {
    const pulse = () => {
      const r = app.querySelector('[data-respell]');
      if (r) {
        r.classList.remove('pulse');
        void r.getBoundingClientRect();
        r.classList.add('pulse');
      }
    };
    const useReal = p.lang && Speech.canSpeak(p.lang);
    Speech.speak(useReal ? p.text : p.respell, {
      lang: useReal ? p.lang : 'en-US',
      slow: !!slow,
      onSilent: pulse,
    });
    pulse();
  }

  // ---------------- boot ----------------
  // Before the engine reads localStorage, adopt the IndexedDB mirror if it
  // holds a NEWER journey (iPadOS can evict one store but not the other).
  function boot() {
    Persist.restoreFromMirror()
      .then(() => bootGame())
      .catch(() => bootGame());
  }

  function bootGame() {
    app = document.getElementById('app');
    const fx = document.getElementById('fx');
    Particles.attach(fx);

    game = Engine.create({ store: Persist.createStore(), rng: Math.random });

    AudioKit.setMuted(isMuted());
    Speech.setMuted(isMuted());
    Particles.setReduced(reduced());
    try {
      const mq = window.matchMedia('(prefers-reduced-motion: reduce)');
      if (mq && mq.addEventListener) mq.addEventListener('change', (e) => Particles.setReduced(e.matches));
    } catch (e) { /* matchMedia always exists on target Safari */ }

    document.addEventListener('pointerdown', () => {
      AudioKit.init();
      Speech.init();
    }, { capture: true });
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) AudioKit.poke();
    });
    app.addEventListener('pointerdown', (e) => {
      const t = e.target;
      if (t && t.closest && t.closest('[data-action="backspace"]') && pendingSubmitTimer) {
        clearTimeout(pendingSubmitTimer);
        pendingSubmitTimer = 0;
      }
      if (t && t.closest && t.closest('button')) AudioKit.play('tap');
    });
    Juice.pressify(app);
    app.addEventListener('click', onTap);

    kick();
    showTitle();
  }

  // The rAF loop runs only while there is visible work (particles alive or a
  // sparkle trail pending), then sleeps — no 60fps canvas clears during 25
  // minutes of reading. Every effect site calls kick() to wake it.
  function kick() {
    if (!rafActive) {
      rafActive = true;
      lastTs = 0;
      requestAnimationFrame(loop);
    }
  }

  function burstFx(kind, x, y, opts) {
    Particles.burst(kind, x, y, opts);
    kick();
  }

  function loop(ts) {
    const dt = lastTs ? Math.min((ts - lastTs) / 1000, 0.05) : 0;
    lastTs = ts;
    if (ts < trailUntil) {
      const c = Avatar.center();
      if (c) Particles.sparkleTrail(c.x + (Math.random() - 0.5) * 50, c.y + (Math.random() - 0.5) * 60);
    }
    Particles.tick(dt);
    if (Particles.count() > 0 || performance.now() < trailUntil) {
      requestAnimationFrame(loop);
    } else {
      rafActive = false;
    }
  }

  // ---------------- input ----------------
  function onTap(e) {
    const t = e.target;
    if (t && t.classList && t.classList.contains('overlay')) {
      if (t.hasAttribute('data-settings-overlay')) closeSettings();
      else if (t.hasAttribute('data-leave-overlay')) closeLeave();
      return;
    }
    const moveBtn = t && t.closest ? t.closest('[data-move]') : null;
    if (moveBtn && screen === 'visit') {
      onMove(moveBtn.getAttribute('data-move'));
      return;
    }
    const actBtn = t && t.closest ? t.closest('[data-action]') : null;
    if (actBtn) {
      handleAction(actBtn.getAttribute('data-action'), actBtn);
      return;
    }
    const echoTile = t && t.closest ? t.closest('[data-echo-tile]') : null;
    if (echoTile) {
      tapEcho(echoTile);
      return;
    }
    if (screen !== 'visit' || busy || !run) return;
    const tile = t.closest ? t.closest('[data-tile]') : null;
    if (tile) {
      tapTile(tile);
      return;
    }
    const ch = t.closest ? t.closest('[data-choice]') : null;
    if (ch) tapChoice(ch);
  }

  function closeLeave() {
    if (leaveEl) {
      leaveEl.remove();
      leaveEl = null;
    }
  }

  function handleAction(action, btn) {
    if (action === 'play') showMap();
    else if (action === 'back-map') {
      // mid-visit, a run is unresumable: confirm before discarding it
      if (screen === 'visit' && run && !(leaveEl && leaveEl.isConnected)) leaveEl = Screens.leaveConfirm(app);
      else if (!(screen === 'visit' && run)) { clearTimers(); run = null; showMap(); }
    }
    else if (action === 'leave-stay') closeLeave();
    else if (action === 'leave-go') { closeLeave(); clearTimers(); run = null; showMap(); }
    else if (action === 'reveal-continue') advanceNow();
    else if (action === 'journal') { buildPhrase = null; showJournal(journalTab); }
    else if (action === 'journal-tab') { buildPhrase = null; showJournal(btn.getAttribute('data-tab')); }
    else if (action === 'settings') openSettings();
    else if (action === 'close-settings') closeSettings();
    else if (action === 'toggle-mute') toggleMute();
    else if (action === 'backspace') tilesBackspace();
    else if (action === 'mailbag') startMailbag();
    else if (action === 'map-chapter') {
      const ci = parseInt(btn.getAttribute('data-ch'), 10);
      const c = Engine.CHAPTERS[ci];
      if (!c) return;
      const st = Destinations.byId[c.dests[0]] ? game.destStatus(c.dests[0]) : { unlocked: false };
      if (st.unlocked) {
        mapChapter = ci;
        showMap();
      } else if (st.waitingOnWinds) {
        try { Juice.toast('🌬️ The trade winds gather as you remember — visit old friends!', 3600); } catch (e) { /* toast only */ }
      } else {
        try { Juice.toast('Finish the earlier stops to fly here!'); } catch (e) { /* toast only */ }
      }
    }
    else if (action === 'suitcase-pack') suitcasePack();
    else if (action === 'suitcase-unpack') suitcaseUnpack();
    else if (action === 'step-next') advanceNow();
    else if (action === 'landmark-next') { landmarkBeat += 1; renderStep(); }
    else if (action === 'take-photo') takePhoto();
    else if (action === 'tell-dad') tellDad(btn);
    else if (action === 'close-landing') { closeView = null; showMap(); }
    else if (action === 'hello-build') {
      const p = allPhrases().find((x) => x.id === btn.getAttribute('data-id'));
      if (p) {
        buildPhrase = p;
        showJournal('hello');
      }
    }
    else if (action === 'say' || action === 'say-slow') {
      const p = activePhrase();
      if (p) sayPhrase(p, action === 'say-slow');
    }
    else if (action === 'say-echo') sayEcho();
    else if (action === 'say-fact') {
      if (curView && curView.step && curView.step.fact) {
        Speech.speak(curView.step.fact.text, { lang: 'en-US', onSilent: () => {} });
      }
    }
    else if (action === 'hello-say' || action === 'hello-slow') {
      const id = btn.getAttribute('data-id');
      const p = allPhrases().find((x) => x.id === id);
      if (p) {
        const useReal = p.lang && Speech.canSpeak(p.lang);
        Speech.speak(useReal ? p.text : p.respell, { lang: useReal ? p.lang : 'en-US', slow: action === 'hello-slow', onSilent: () => {} });
      }
    }
  }

  function toggleMute() {
    const m = !isMuted();
    game.setMuted(m);
    AudioKit.setMuted(m);
    Speech.setMuted(m);
    for (const b of app.querySelectorAll('[data-mute-btn]')) b.textContent = m ? '🔇 Sound is off' : '🔊 Sound is on';
    for (const b of app.querySelectorAll('[data-mute-icon]')) b.textContent = Screens.muteIcon(m);
  }

  function allPhrases() {
    const out = [];
    for (const d of Destinations.list) for (const p of d.phrases) out.push(p);
    return out;
  }

  function activePhrase() {
    if (buildPhrase) return buildPhrase;
    return curView && curView.step && curView.step.phrase ? curView.step.phrase : null;
  }

  // ---------------- echo-trace: hear it, then build it back ----------------
  function initEcho(phrase) {
    const total = String(phrase.text).split(/\s+/).filter(Boolean).length;
    echoState = { phrase, total, next: 0, active: false };
  }

  function echoTileEl(i) {
    return app.querySelector('[data-echo-tile="' + i + '"]');
  }

  function sayEcho() {
    const p = activePhrase();
    if (!p || !echoState) return;
    echoState.active = false;
    echoState.next = 0;
    for (let i = 0; i < echoState.total; i++) {
      const el = echoTileEl(i);
      if (el) el.classList.remove('lit', 'ready', 'placed');
    }
    const useReal = p.lang && Speech.canSpeak(p.lang);
    const armed = () => {
      echoState.active = true;
      const first = echoTileEl(0);
      if (first) first.classList.add('ready');
    };
    const spoke = Speech.speak(useReal ? p.text : p.respell, {
      lang: useReal ? p.lang : 'en-US',
      slow: true,
      onChunk: (i) => {
        const prev = echoTileEl(i - 1);
        if (prev) prev.classList.remove('lit');
        const el = echoTileEl(Math.min(i, echoState.total - 1));
        if (el) el.classList.add('lit');
      },
      onDone: () => {
        const last = echoTileEl(echoState.total - 1);
        if (last) last.classList.remove('lit');
        armed();
      },
      onSilent: armed, // no voice? she can still build it
    });
    if (!spoke) armed();
  }

  function tapEcho(tileEl) {
    if (!echoState || !echoState.active) return;
    const idx = parseInt(tileEl.getAttribute('data-echo-tile'), 10);
    if (idx !== echoState.next) return; // only the pulsing next tile responds
    tileEl.classList.remove('ready', 'lit');
    tileEl.classList.add('placed');
    AudioKit.tapNote(idx);
    echoState.next += 1;
    if (echoState.next >= echoState.total) {
      echoState.active = false;
      const built = game.phraseBuilt(echoState.phrase.id);
      AudioKit.play('levelup');
      try { Juice.toast(built === 1 ? '⭐ You said it AND built it!' : '⭐ Built it again!'); } catch (e) { /* toast only */ }
      if (!reduced()) {
        const c = centerOf(app.querySelector('[data-echo]'));
        burstFx('sparkle', c.x, c.y, { count: 14 });
      }
    } else {
      const nxt = echoTileEl(echoState.next);
      if (nxt) nxt.classList.add('ready');
    }
  }

  // ---------------- routing ----------------
  function showTitle() {
    clearTimers();
    Speech.stop();
    screen = 'title';
    Screens.title(app);
  }

  // the continent page holding the plane (first unlocked, unfinished stop)
  function planeChapterIdx() {
    for (let ci = 0; ci < Engine.CHAPTERS.length; ci++) {
      for (const id of Engine.CHAPTERS[ci].dests) {
        if (!Destinations.byId[id]) continue;
        const st = game.destStatus(id);
        if (st.unlocked && !st.done) return ci;
      }
    }
    for (let ci = Engine.CHAPTERS.length - 1; ci >= 0; ci--) {
      if (Destinations.byId[Engine.CHAPTERS[ci].dests[0]]
        && game.destStatus(Engine.CHAPTERS[ci].dests[0]).unlocked) return ci;
    }
    return 0;
  }

  function showMap() {
    clearTimers();
    Speech.stop(); // a greeting must never narrate over the route map
    run = null;
    visitDest = null;
    screen = 'map';
    const planeCi = planeChapterIdx();
    const page = mapChapter >= 0 ? mapChapter : planeCi;
    const pageIds = Engine.CHAPTERS[page] ? Engine.CHAPTERS[page].dests.filter((id) => Destinations.byId[id]) : [];

    // golden threads: full arcs on-page, stubs + a tab dot when the far end
    // lives on another continent page
    const lit = game.litThreads();
    const threadPairs = [];
    const threadStubs = [];
    const dotChapters = new Set();
    for (const pairId of lit) {
      const ids = Destinations.threads[pairId].map((fid) => Destinations.factIndex[fid].dest.id);
      const fresh = game.state.threadsSeen.indexOf(pairId) === -1;
      const onPage = ids.filter((id) => pageIds.indexOf(id) > -1);
      if (onPage.length === 2) {
        threadPairs.push({ ids, fresh });
      } else if (onPage.length === 1) {
        const offId = ids.find((id) => pageIds.indexOf(id) === -1);
        const offCi = Engine.CHAPTERS.findIndex((c) => c.dests.indexOf(offId) > -1);
        threadStubs.push({ id: onPage[0], dir: offCi > page ? 'right' : 'left', fresh });
        if (offCi > -1) dotChapters.add(offCi);
      }
    }

    const chapters = Engine.CHAPTERS.map((c, ci) => {
      const firstId = c.dests[0];
      const st = Destinations.byId[firstId] ? game.destStatus(firstId) : { unlocked: false };
      return {
        idx: ci,
        name: c.name,
        state: st.unlocked ? 'open' : st.waitingOnWinds ? 'winds' : 'locked',
        current: ci === page,
        dot: dotChapters.has(ci) || (ci === planeCi && ci !== page),
      };
    });

    Screens.route(app, { mailCount: game.mailbagIds().length, chapters });
    const container = app.querySelector('[data-routemap]');
    const dests = pageIds.map((id) => {
      const d = Destinations.byId[id];
      const st = game.destStatus(d.id);
      return {
        id: d.id, name: d.name, unlocked: st.unlocked, done: st.done,
        shine: st.shine, utcOffset: d.utcOffset, palette: d.palette, mapEmoji: d.mapEmoji,
      };
    });
    RouteMap.render(container, {
      dests,
      threadPairs,
      threadStubs,
      hasPrev: page > 0,
      hasNext: page < Engine.CHAPTERS.length - 1,
      hour: new Date().getHours(),
      now: new Date(),
    }, startVisit);
    // a brand-new golden thread draws itself in, once
    if (threadPairs.some((t) => t.fresh)) {
      AudioKit.play('hatch');
      game.markThreadsSeen(lit);
    }
    if (pendingChapterToast) {
      const msg = pendingChapterToast;
      pendingChapterToast = '';
      try { Juice.toast(msg, 3600); } catch (e) { /* toast only */ }
    }
    // the little clocks tick while she looks at the world
    scheduleClockTick();
  }

  function scheduleClockTick() {
    timer(30000, () => {
      if (screen !== 'map') return;
      for (const el of app.querySelectorAll('[data-utc]')) {
        const off = parseFloat(el.getAttribute('data-utc'));
        if (!isNaN(off)) el.textContent = '🕐 ' + RouteMap.localTimeText(off, new Date());
      }
      scheduleClockTick();
    });
  }

  function showJournal(tab) {
    clearTimers();
    Speech.stop();
    journalTab = tab || 'stamps';
    screen = 'journal';
    const sch = game.scheduler;
    const stamps = Destinations.list.map((d) => {
      const st = game.destStatus(d.id);
      const note = !st.done ? 'Waiting for your visit…'
        : st.shine >= 3 ? 'Gold! You remember it all!'
          : st.shine >= 2 ? 'Full color — keep remembering!'
            : 'Stamped! Memories make it shine.';
      return { name: d.name, emoji: d.mapEmoji || '🌍', shine: st.shine, note };
    });
    // pages grouped by VISITED destination; unvisited lands are one quiet
    // teaser row, never a wall of blanks
    const factGroups = [];
    let teaserCount = 0;
    for (const id of Engine.ROUTE) {
      const d = Destinations.byId[id];
      if (!d) continue;
      if (!game.destStatus(d.id).done) {
        teaserCount += 1;
        continue;
      }
      let inked = 0;
      const rows = d.facts.map((f) => {
        const s = sch.strengthOf(f.id);
        const met = sch.isIntroduced(f.id);
        if (met && s >= 1) inked += 1;
        return {
          emoji: f.tiles.emoji,
          state: !met ? 'blank' : s >= 1 ? '' : 'faint',
          fresh: sessionInked.has(f.id),
          line: !met ? 'This page waits for a return trip…'
            : s >= 1 ? f.text : 'You met this one — remember it to ink it in!',
        };
      });
      factGroups.push({ destName: d.name, emoji: d.mapEmoji, inked, total: d.facts.length, rows });
    }
    const photos = (game.state.photos || []).slice().reverse().map((p) => {
      const d = Destinations.byId[p.dest];
      const moveEmoji = { cartwheel: '🤸', flip: '🌟', stuck: '🙌', animal: d ? d.animal.emoji : '🐾' };
      return {
        strip: (p.moves || []).map((m) => moveEmoji[m] || '✨').join(' '),
        title: d ? d.name : p.dest,
        sub: 'Showtime! ' + (p.day || ''),
        caption: p.caption || '',
        crumbs: !!p.crumbs,
      };
    });
    const crumbsCount = (game.state.photos || []).filter((p) => p.crumbs).length;
    const hellos = allPhrases()
      .filter((p) => game.state.phrases[p.id] && game.state.phrases[p.id].heard > 0)
      .map((p) => Object.assign({ built: (game.state.phrases[p.id].built | 0) }, p));
    const build = journalTab === 'hello' ? buildPhrase : null;
    Screens.journal(app, { tab: journalTab, stamps, factGroups, teaserCount, photos, crumbsCount, hellos, build });
    if (build) initEcho(build);
  }

  // ---------------- the suitcase: spare copy of all progress ----------------
  function suitcaseBox() {
    return settingsEl ? settingsEl.querySelector('[data-suitcase]') : null;
  }

  function suitcasePack() {
    const box = suitcaseBox();
    if (!box) return;
    box.hidden = false;
    box.value = Persist.pack(game.state);
    box.select();
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(box.value);
        Juice.toast('🧳 Packed! The code is copied — save it somewhere safe.', 3600);
      } else {
        Juice.toast('🧳 Packed! Copy the code and save it somewhere safe.', 3600);
      }
    } catch (e) {
      try { Juice.toast('🧳 Packed! Copy the code and save it somewhere safe.', 3600); } catch (e2) { /* toast only */ }
    }
  }

  function suitcaseUnpack() {
    const box = suitcaseBox();
    if (!box) return;
    if (box.hidden) {
      box.hidden = false;
      box.value = '';
      box.focus();
      try { Juice.toast('Paste a suitcase code, then tap Unpack again.', 3200); } catch (e) { /* toast only */ }
      return;
    }
    const data = Persist.unpack(box.value);
    if (!data) {
      try { Juice.toast('That code does not look like a suitcase. Check the paste!', 3400); } catch (e) { /* toast only */ }
      return;
    }
    // never silently downgrade a richer save
    if (data.sessions < game.state.sessions) {
      try { Juice.toast('This iPad already has a newer journey — keeping it.', 3600); } catch (e) { /* toast only */ }
      return;
    }
    try {
      localStorage.setItem(Persist.KEY, JSON.stringify(data));
      Juice.toast('📂 Unpacked! Restarting the journey…', 2600);
      setTimeout(() => window.location.reload(), 1200);
    } catch (e) {
      try { Juice.toast('Could not unpack here. Try again!', 3000); } catch (e2) { /* toast only */ }
    }
  }

  function openSettings() {
    if (settingsEl && settingsEl.isConnected) return;
    const langs = [
      { label: 'English', lang: 'en-US' },
      { label: 'Spanish (Mateo)', lang: 'es-MX' },
      { label: 'Mandarin (Flushing)', lang: 'zh-CN' },
    ];
    const voices = langs.map((l) => ({ label: l.label, ok: Speech.canSpeak(l.lang) }));
    settingsEl = Screens.settings(app, { muted: isMuted(), voices });
  }
  function closeSettings() {
    if (settingsEl) {
      settingsEl.remove();
      settingsEl = null;
    }
  }

  // ---------------- visit flow ----------------
  function startVisit(destId) {
    const st = game.destStatus(destId);
    if (!st.unlocked) {
      if (st.waitingOnWinds) {
        Juice.toast('🌬️ The trade winds gather as you remember — visit old friends!', 3600);
      } else {
        Juice.toast('Finish the earlier stop to fly here!');
      }
      return;
    }
    mapChapter = -1; // after a visit, the map follows the plane again
    clearTimers();
    visitDest = Destinations.byId[destId];
    runInked = [];
    run = game.startVisit(destId);
    screen = 'visit';
    const cheer = game.state.friends.indexOf(visitDest.animal.id) > -1 ? visitDest.animal.emoji : '';
    Screens.visitShell(app, { destName: visitDest.name, muted: isMuted(), cheer });
    if (visitDest.motif) AudioKit.tune(visitDest.motif.notes, visitDest.motif.bpm);
    renderStep();
  }

  function startMailbag() {
    const mb = game.startMailbag();
    if (!mb) {
      Juice.toast('The mailbag is happily empty!');
      return;
    }
    clearTimers();
    visitDest = null;
    runInked = [];
    run = mb;
    screen = 'visit';
    Screens.visitShell(app, { destName: 'Mailbag', muted: isMuted(), cheer: '📬' });
    renderStep();
  }

  function stepHost() {
    return app.querySelector('[data-step-host]');
  }

  function renderStep() {
    const cur = run ? run.current() : null;
    if (!cur) {
      showMap();
      return;
    }
    curView = cur;
    slotsArr = [];
    prefillCount = 0;
    selection = [];
    busy = false;
    landmarkBeat = landmarkBeat || 0;
    Screens.setProgress(app, cur.index, cur.total);
    const host = stepHost();
    if (!host) return;
    const sect = app.querySelector('.screen-challenge');
    if (sect) sect.classList.toggle('showtime-mode', cur.type === 'showtime');

    if (cur.type === 'skill' || cur.type === 'retrieval') {
      let frameCtx = null;
      if (cur.type === 'retrieval') {
        const entry = Destinations.factIndex[cur.step.factId];
        const fdest = entry ? entry.dest : null;
        const frame = cur.item.frame;
        frameCtx = {
          frame,
          intro: Copy.frameIntro(frame),
          sender: fdest && frame === 'reply' ? fdest.hostKid.name
            : frame === 'brief' ? nextKidName() : '',
          // squabbling friends fit choice cards only; others get the banner
          animals: fdest && frame === 'dispute' && cur.item.type === 'choice'
            ? [fdest.animal.emoji, fdest.shyAnimal.emoji] : null,
        };
      }
      Screens.challenge(host, cur, frameCtx);
      if (cur.item.type === 'tiles' && cur.item.prefill) {
        prefillCount = cur.item.prefill;
        for (let i = 0; i < prefillCount; i++) slotsArr.push({ letter: cur.item.word[i], el: null });
      }
      Avatar.mount(app.querySelector('[data-avatar]'));
      return;
    }
    if (cur.type === 'arrival') Screens.stepArrival(host, cur.step);
    else if (cur.type === 'vignette') {
      Screens.stepVignette(host, cur.step);
      AudioKit.play('pop');
    }
    else if (cur.type === 'wonder-answer') {
      Screens.stepWonderAnswer(host, cur.step);
      AudioKit.play('levelup');
    }
    else if (cur.type === 'phrase') {
      Screens.stepPhrase(host, cur.step);
      initEcho(cur.step.phrase);
      timer(450, () => sayPhrase(cur.step.phrase, false)); // the host kid greets her
    } else if (cur.type === 'wonder') Screens.stepWonder(host, cur.step);
    else if (cur.type === 'fact') {
      Screens.stepFact(host, cur.step);
      AudioKit.play('hatch');
    } else if (cur.type === 'friend') {
      Screens.stepFriend(host, cur.step);
      AudioKit.play('hatch');
      if (!reduced()) {
        const c = centerOf(host);
        burstFx('hatch', c.x, c.y - 40);
      }
    } else if (cur.type === 'souvenir') {
      Screens.stepSouvenir(host, cur.step);
      AudioKit.play('pop');
    } else if (cur.type === 'landmark') {
      Screens.stepLandmark(host, cur.step, Math.min(landmarkBeat, cur.step.landmark.beats.length - 1));
    } else if (cur.type === 'showtime') {
      showMoves = [];
      photoTaken = false;
      const animal = visitDest ? visitDest.animal : { emoji: '🐾', move: 'Together!' };
      Screens.showtime(host, visitDest || { id: 'tci', name: '' }, !!cur.step.isReturn, animal);
      Avatar.mount(host.querySelector('[data-avatar]'));
      AudioKit.play('fanfare');
      return; // the stage owns the avatar rig during showtime
    }
    Avatar.mount(app.querySelector('.ch-avatar [data-avatar]'));
  }

  // ---------------- showtime choreography ----------------
  function playMove(move) {
    if (move === 'animal') {
      const a = app.querySelector('[data-st-animal]');
      if (a && !reduced()) {
        a.classList.remove('st-move');
        void a.getBoundingClientRect();
        a.classList.add('st-move');
      }
    } else {
      Avatar.trick(move === 'cartwheel' ? 1 : move === 'flip' ? 2 : 3);
      trailUntil = performance.now() + 900;
      kick();
    }
  }

  function onMove(move) {
    if (photoTaken || showMoves.length >= 3) return;
    showMoves.push(move);
    AudioKit.play('correct');
    playMove(move);
    if (showMoves.length >= 3) {
      // her whole routine replays against the destination's motif,
      // then SHE takes the photo
      const moves = app.querySelector('[data-moves]');
      if (moves) moves.hidden = true;
      timer(1100, () => {
        if (visitDest && visitDest.motif) AudioKit.tune(visitDest.motif.notes, visitDest.motif.bpm);
        showMoves.forEach((m, i) => timer(200 + i * 1100, () => playMove(m)));
        timer(200 + showMoves.length * 1100, () => {
          const shutter = app.querySelector('[data-shutter]');
          if (shutter) shutter.hidden = false;
        });
      });
    }
  }

  // Crumbs the pigeon: meets her in New York, then sneaks into the first
  // photo at each new destination after that. Deterministic, never random.
  function crumbsBomb() {
    const c = game.state.crumbs;
    const dest = visitDest ? visitDest.id : '';
    if (!dest) return false;
    if (!c.met) {
      if (dest !== 'nyc') return false;
      c.met = true;
      c.bombed.push(dest);
      game.save();
      try { Juice.toast('🐦 A pigeon stowed away! Crumbs joins the journey!', 3600); } catch (e) { /* toast only */ }
      return true;
    }
    if (c.bombed.indexOf(dest) > -1) return false;
    c.bombed.push(dest);
    game.save();
    try { Juice.toast('🐦 Crumbs photobombed your picture!', 3000); } catch (e) { /* toast only */ }
    return true;
  }

  function takePhoto() {
    if (photoTaken || !run) return;
    photoTaken = true;
    const stage = app.querySelector('[data-stage]');
    // shutter flash, then the polaroid develops around the frozen stage
    const flash = app.querySelector('[data-flash]');
    if (flash && !reduced()) {
      flash.classList.add('on');
      timer(360, () => flash.classList.remove('on'));
    }
    AudioKit.play('pop');
    const bombed = crumbsBomb();
    if (bombed) {
      const cr = app.querySelector('[data-crumbs]');
      if (cr) cr.hidden = false;
    }
    run.recordPhoto(showMoves, bombed ? { crumbs: true } : null);
    timer(420, () => {
      AudioKit.play('levelup');
      const pol = app.querySelector('[data-polaroid]');
      if (pol) pol.classList.add('show');
      if (stage) stage.classList.add('photo-taken');
      if (!reduced() && stage) {
        const c = centerOf(stage);
        burstFx('confetti', c.x, c.y - 40);
      }
      const fw = visitDest && visitDest.showtime ? visitDest.showtime.farewell : null;
      const fwEl = app.querySelector('[data-farewell]');
      if (fw && fwEl) {
        fwEl.textContent = fw.text + '  (' + fw.respell + ')';
        const useReal = fw.lang && Speech.canSpeak(fw.lang);
        timer(700, () => Speech.speak(useReal ? fw.text : fw.respell, { lang: useReal ? fw.lang : 'en-US', onSilent: () => {} }));
      }
      const shutter = app.querySelector('[data-shutter]');
      if (shutter) shutter.hidden = true;
      const after = app.querySelector('[data-after]');
      if (after) after.hidden = false;
    });
  }

  // ---------------- tiles / choices (kingdom mechanics) ----------------
  function tapTile(tile) {
    if (!curView || !curView.item || curView.item.type !== 'tiles') return;
    if (tile.classList.contains('tile-used')) return;
    const word = curView.item.word;
    if (slotsArr.length >= word.length) return;
    const letter = tile.getAttribute('data-tile');
    tile.classList.add('tile-used');
    slotsArr.push({ letter, el: tile });
    Screens.setSlot(app, slotsArr.length - 1, letter);
    if (slotsArr.length === word.length) {
      pendingSubmitTimer = setTimeout(() => {
        pendingSubmitTimer = 0;
        submitAnswer(slotsArr.map((s) => s.letter).join(''));
      }, 1200);
    }
  }

  function tilesBackspace() {
    if (busy || slotsArr.length <= prefillCount) return;
    if (pendingSubmitTimer) {
      clearTimeout(pendingSubmitTimer);
      pendingSubmitTimer = 0;
    }
    const last = slotsArr.pop();
    Screens.setSlot(app, slotsArr.length, null);
    if (last && last.el) last.el.classList.remove('tile-used');
  }

  function resetAttemptInputs() {
    if (!curView || !curView.item) return;
    if (curView.item.type === 'tiles') {
      for (let i = prefillCount; i < slotsArr.length; i++) Screens.setSlot(app, i, null);
      for (const s of slotsArr.slice(prefillCount)) if (s.el) s.el.classList.remove('tile-used');
      slotsArr = slotsArr.slice(0, prefillCount);
    } else {
      for (const b of app.querySelectorAll('.choice.picked')) b.classList.remove('picked');
      selection = [];
    }
  }

  function tapChoice(btn) {
    if (!curView || !curView.item || curView.item.type !== 'choice') return;
    const idx = parseInt(btn.getAttribute('data-choice'), 10);
    const multi = Array.isArray(curView.item.answerIndices);
    if (!multi) {
      btn.classList.add('picked');
      submitAnswer(idx);
      return;
    }
    const at = selection.indexOf(idx);
    if (at > -1) {
      if (pendingSubmitTimer) {
        clearTimeout(pendingSubmitTimer);
        pendingSubmitTimer = 0;
      }
      selection.splice(at, 1);
      btn.classList.remove('picked');
      return;
    }
    if (selection.length >= 2) return;
    selection.push(idx);
    btn.classList.add('picked');
    if (selection.length === 2) {
      if (pendingSubmitTimer) {
        clearTimeout(pendingSubmitTimer);
        pendingSubmitTimer = 0;
      }
      pendingSubmitTimer = setTimeout(() => {
        pendingSubmitTimer = 0;
        if (selection.length === 2) submitAnswer(selection.slice());
      }, 900);
    }
  }

  // ---------------- outcomes ----------------
  function submitAnswer(answer) {
    if (!run) return;
    busy = true;
    if (pendingSubmitTimer) {
      clearTimeout(pendingSubmitTimer);
      pendingSubmitTimer = 0;
    }
    const out = run.submit(answer);
    if (out) handleOutcome(out);
  }

  function handleOutcome(out) {
    const card = app.querySelector('[data-card]');
    let inked = null;
    let thread = false;
    for (const ev of out.events || []) {
      if (ev.type === 'inked') {
        inked = ev;
        runInked.push(ev.factId);
        sessionInked.add(ev.factId);
      } else if (ev.type === 'thread') thread = true;
    }

    if (out.status === 'correct') {
      AudioKit.play('correct');
      Screens.clearNotes(app);
      Screens.showFeedback(app, inked ? Copy.remember(Math.random) : Copy.correct(Math.random));
      Avatar.trick(out.firstTry ? 2 : 1);
      trailUntil = performance.now() + 950;
      if (reduced()) {
        if (card) {
          card.classList.add('soft-flash');
          timer(750, () => card.classList.remove('soft-flash'));
        }
      } else {
        const c = centerOf(card);
        burstFx(inked ? 'hatch' : 'shatter', c.x, c.y - 30);
      }
      if (thread) {
        timer(600, () => {
          AudioKit.play('levelup');
          try { Juice.toast('✨ A golden thread joins your journey!', 3200); } catch (e) { /* toast only */ }
        });
      }
      timer(1200, advanceNow);
      return;
    }

    if (out.status === 'retry') {
      AudioKit.play('miss');
      if (card) Juice.shake(card);
      Screens.showHint(app, Copy.miss(Math.random), out.hint || run.hint());
      resetAttemptInputs();
      busy = false;
      return;
    }

    // friendly reveal: she reads at her own pace and taps Keep going —
    // no hidden tap gate, no auto-advance clock (the only timer this game
    // ever pointed at a learning moment is gone)
    AudioKit.play('pop');
    Screens.showReveal(app, Copy.reveal(Math.random), out.explain || '');
    if (curView.item.type === 'tiles') {
      Screens.fillSlotsWith(app, String(out.correctAnswer || '').toUpperCase());
    } else {
      Screens.markChoiceAnswer(app, out.correctAnswer);
    }
  }

  // the host kid of the next stop on the route (for the 'brief' frame)
  function nextKidName() {
    for (const id of Engine.ROUTE) {
      const st = game.destStatus(id);
      if (st.unlocked && !st.done && Destinations.byId[id]) {
        return Destinations.byId[id].hostKid.name;
      }
    }
    return 'Your next friend';
  }

  function tellDad(btn) {
    if (!closeView || !closeView.tellDad) return;
    const i = parseInt(btn.getAttribute('data-fact-i'), 10);
    const pick = closeView.tellDad.find((t) => t.i === i);
    if (!pick) return;
    game.captionLastPhoto(closeView.destId, pick.text);
    closeView.chosenDad = pick.text;
    closeView.tellDad = null;
    AudioKit.play('hatch');
    Screens.journalClose(app, closeView);
  }

  // Every session lands somewhere: the journal close shows the stamp, the
  // new pages, and (after a first visit) the postcard caption for Dad.
  function showJournalClose(res, presented) {
    clearTimers();
    Speech.stop();
    screen = 'close';
    const dest = Destinations.byId[res.destId];
    const st = res.kind === 'mailbag' ? null : game.destStatus(res.destId);
    const inkedFacts = runInked
      .map((id) => Destinations.factIndex[id])
      .filter(Boolean)
      .map((e) => ({ emoji: e.fact.tiles.emoji, text: e.fact.text }));
    const newPages = (presented || []).map((f) => ({ emoji: f.tiles.emoji, text: f.text }));
    const facts = res.kind === 'mailbag' ? inkedFacts : newPages.concat(inkedFacts).slice(0, 5);
    closeView = {
      kind: res.kind,
      destId: res.destId,
      destName: dest ? dest.name : 'The mailbag',
      emoji: dest ? dest.mapEmoji : '📬',
      shine: st ? Math.max(1, st.shine) : 2,
      facts,
      tellDad: res.kind === 'first' && newPages.length
        ? newPages.slice(0, 3).map((f, i) => ({ i, text: f.text }))
        : null,
      chosenDad: null,
    };
    Screens.journalClose(app, closeView);
    AudioKit.play(res.kind === 'first' ? 'fanfare' : 'hatch');
    if (!reduced()) {
      const stamp = app.querySelector('[data-close-stamp]');
      timer(300, () => {
        const c = centerOf(stamp);
        burstFx(res.kind === 'first' ? 'confetti' : 'sparkle', c.x, c.y, { count: res.kind === 'first' ? 50 : 16 });
      });
    }
  }

  function advanceNow() {
    clearTimers();
    if (!run) {
      showMap();
      return;
    }
    landmarkBeat = 0;
    const res = run.advance();
    if (res && res.finished) {
      const presented = run.presentedFacts ? run.presentedFacts() : [];
      if (res.kind === 'first') {
        const next = game.nextAfter(res.destId);
        if (next && next.chapterStart && next.chapter) {
          pendingChapterToast = '✈️ A new continent opens: ' + next.chapter.name + '!';
        } else {
          pendingChapterToast = '🛂 A new stamp in your passport!';
        }
      }
      run = null;
      showJournalClose(res, presented);
    } else if (res) {
      renderStep();
    } else {
      showMap();
    }
  }

  // ---------------- start ----------------
  if (typeof document !== 'undefined') {
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', boot);
    } else {
      boot();
    }
  }

  return { boot };
})();

})();
</script>
</body>
</html>
